// ================================================================
// AUDIO SYSTEM v2（Web Audio API）
// ================================================================
let audioCtx=null;
let seVolume=0.6;  // 0.0〜1.0 スライダーで制御

function getACtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function masterOut(gain=0.3){
  let ac=getACtx(), g=ac.createGain();
  g.gain.value=gain*seVolume;
  g.connect(ac.destination);
  return g;
}

// ---------------------------------------------------------------
// チャージ音：澄んだ鈴の音（ベル系） 3段階
// tier 1=低め, 2=中, 3=高（200%到達時）
// ---------------------------------------------------------------
function playCharge(tier){
  let ac=getACtx(), out=masterOut(0.32);
  let baseFreqs=[660, 990, 1480]; // E5, B5, F#6
  let f=baseFreqs[constrain(tier-1,0,2)];
  let dur=[0.22, 0.28, 0.38][tier-1];

  // メイン正弦波（鈴の基音）
  let osc=ac.createOscillator(), env=ac.createGain();
  osc.type='sine'; osc.frequency.value=f;
  env.gain.setValueAtTime(0, ac.currentTime);
  env.gain.linearRampToValueAtTime(0.8, ac.currentTime+0.005);
  env.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
  osc.connect(env); env.connect(out);
  osc.start(); osc.stop(ac.currentTime+dur+0.05);

  // 2倍音（ベルらしい輝き）
  let osc2=ac.createOscillator(), env2=ac.createGain();
  osc2.type='sine'; osc2.frequency.value=f*2.76; // ベルの特徴的な倍音比
  env2.gain.setValueAtTime(0, ac.currentTime);
  env2.gain.linearRampToValueAtTime(0.35, ac.currentTime+0.004);
  env2.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur*0.6);
  osc2.connect(env2); env2.connect(out);
  osc2.start(); osc2.stop(ac.currentTime+dur);

  // tier3（200%）は追加の高音フラッシュ
  if(tier===3){
    let osc3=ac.createOscillator(), env3=ac.createGain();
    osc3.type='sine'; osc3.frequency.value=f*4;
    env3.gain.setValueAtTime(0, ac.currentTime);
    env3.gain.linearRampToValueAtTime(0.25, ac.currentTime+0.003);
    env3.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.12);
    osc3.connect(env3); env3.connect(out);
    osc3.start(); osc3.stop(ac.currentTime+0.14);
  }
}

// ---------------------------------------------------------------
// 発射音：スライド感のあるウッと滑る音
// pct: 0-200
// ---------------------------------------------------------------
function playLaunch(pct){
  let ac=getACtx(), out=masterOut(0.28);
  let t=ac.currentTime;
  let tier=pct<67?1:pct<134?2:3;
  let dur=[0.10, 0.15, 0.22][tier-1];
  let vol=[0.55, 0.75, 1.0][tier-1];

  // 木材を滑る低〜中域のこすれ音（バンドパスノイズ）
  let bufLen=Math.floor(ac.sampleRate*dur);
  let buf=ac.createBuffer(1, bufLen, ac.sampleRate);
  let d=buf.getChannelData(0);
  // ピンクノイズ的に生成
  let b0=0,b1=0,b2=0;
  for(let i=0;i<bufLen;i++){
    let wh=Math.random()*2-1;
    b0=0.99886*b0+wh*0.0555179;
    b1=0.99332*b1+wh*0.0750759;
    b2=0.96900*b2+wh*0.1538520;
    d[i]=(b0+b1+b2)*0.11;
  }
  let src=ac.createBufferSource(); src.buffer=buf;
  // 中域バンドパス（木のこすれ音域）
  let bp=ac.createBiquadFilter();
  bp.type='bandpass';
  bp.frequency.setValueAtTime(600, t);
  bp.frequency.exponentialRampToValueAtTime(200, t+dur);
  bp.Q.value=1.5;
  let nenv=ac.createGain();
  nenv.gain.setValueAtTime(vol, t);
  nenv.gain.exponentialRampToValueAtTime(0.001, t+dur);
  src.connect(bp); bp.connect(nenv); nenv.connect(out);
  src.start(t); src.stop(t+dur+0.01);

  // 初速の「カッ」感（短い高域トランジェント）
  let osc=ac.createOscillator(), oenv=ac.createGain();
  osc.type='triangle'; osc.frequency.value=1200;
  oenv.gain.setValueAtTime(vol*0.4, t);
  oenv.gain.exponentialRampToValueAtTime(0.001, t+0.03);
  osc.connect(oenv); oenv.connect(out);
  osc.start(t); osc.stop(t+0.04);
}

// ---------------------------------------------------------------
// 障害物・棚ボトルヒット音：ガシャン！破壊感
// ---------------------------------------------------------------
function playObstacleHit(isShelf=false){
  let ac=getACtx(), out=masterOut(isShelf?0.25:0.30);
  let t=ac.currentTime;

  if(isShelf){
    // 棚ボトル（v1.011版に戻す）：打撃＋高域ノイズ
    let osc=ac.createOscillator(), env=ac.createGain();
    osc.type='square';
    osc.frequency.setValueAtTime(1600, t);
    osc.frequency.exponentialRampToValueAtTime(400, t+0.06);
    env.gain.setValueAtTime(1.0, t);
    env.gain.exponentialRampToValueAtTime(0.001, t+0.07);
    osc.connect(env); env.connect(out);
    osc.start(t); osc.stop(t+0.08);
    let bufLen=Math.floor(ac.sampleRate*0.10);
    let buf=ac.createBuffer(1,bufLen,ac.sampleRate);
    let nd=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) nd[i]=(Math.random()*2-1);
    let nsrc=ac.createBufferSource(); nsrc.buffer=buf;
    let nhp=ac.createBiquadFilter(); nhp.type='highpass'; nhp.frequency.value=3500;
    let nenv=ac.createGain();
    nenv.gain.setValueAtTime(0.7, t);
    nenv.gain.exponentialRampToValueAtTime(0.001, t+0.10);
    nsrc.connect(nhp); nhp.connect(nenv); nenv.connect(out);
    nsrc.start(t); nsrc.stop(t+0.11);
  } else {
    // カウンター障害物：打撃トランジェント＋破片音＋低域ドン（既存）
    let osc=ac.createOscillator(), env=ac.createGain();
    osc.type='square';
    osc.frequency.setValueAtTime(1100, t);
    osc.frequency.exponentialRampToValueAtTime(200, t+0.06);
    env.gain.setValueAtTime(1.0, t);
    env.gain.exponentialRampToValueAtTime(0.001, t+0.07);
    osc.connect(env); env.connect(out);
    osc.start(t); osc.stop(t+0.08);
    let bufLen=Math.floor(ac.sampleRate*0.12);
    let buf=ac.createBuffer(1,bufLen,ac.sampleRate);
    let nd=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) nd[i]=(Math.random()*2-1);
    let nsrc=ac.createBufferSource(); nsrc.buffer=buf;
    let nhp=ac.createBiquadFilter(); nhp.type='highpass'; nhp.frequency.value=2800;
    let nenv=ac.createGain();
    nenv.gain.setValueAtTime(0.8, t);
    nenv.gain.linearRampToValueAtTime(1.0, t+0.008);
    nenv.gain.exponentialRampToValueAtTime(0.001, t+0.12);
    nsrc.connect(nhp); nhp.connect(nenv); nenv.connect(out);
    nsrc.start(t); nsrc.stop(t+0.13);
    let osc2=ac.createOscillator(), env2=ac.createGain();
    osc2.type='sine'; osc2.frequency.value=80;
    env2.gain.setValueAtTime(0.7, t);
    env2.gain.exponentialRampToValueAtTime(0.001, t+0.08);
    osc2.connect(env2); env2.connect(out);
    osc2.start(t); osc2.stop(t+0.10);
  }
}

  env.gain.setValueAtTime(0.9, t);
  env.gain.exponentialRampToValueAtTime(0.001, t+0.06);
  osc.connect(env); env.connect(out);
  osc.start(t); osc.stop(t+0.07);

  // グラスの微細な振動音（高域の余韻）
  let osc2=ac.createOscillator(), env2=ac.createGain();

  env2.gain.setValueAtTime(0.15, t+0.005);
  env2.gain.exponentialRampToValueAtTime(0.001, t+0.10);
  osc2.connect(env2); env2.connect(out);
  osc2.start(t+0.005); osc2.stop(t+0.12);
}

// ================================================================

const STAGES=[
  { id:0, key:'straight',    emoji:'🍺', cleared:false, isLoop:false, bestRecord:null, bestEndlessRecord:null,
    sY(x){ let t=constrain((x-COUNTER_L)/(counterRight()-COUNTER_L),0,1); return GAME_H*0.62-sin(t*PI)*10; }
  },
  { id:1, key:'downhill',    emoji:'🎿', cleared:false, isLoop:false, bestRecord:null, bestEndlessRecord:null,
    sY(x){ let t=constrain((x-COUNTER_L)/(counterRight()-COUNTER_L),0,1); return GAME_H*0.50+t*GAME_H*0.22; }
  },
  { id:2, key:'mountain',    emoji:'⛰️', cleared:false, isLoop:false, bestRecord:null, bestEndlessRecord:null,
    sY(x){ let t=constrain((x-COUNTER_L)/(counterRight()-COUNTER_L),0,1); return GAME_H*0.65-sin(t*PI)*140; }
  },
  { id:3, key:'step_cross', emoji:'🦘', cleared:false, isLoop:false, bestRecord:null, bestEndlessRecord:null,

      let t=constrain((x-COUNTER_L)/(counterRight()-COUNTER_L),0,1);

      let drop=0;
      if(t>0.44) drop=-55;
      else if(t>0.36) drop=-55*((t-0.36)/0.08);

  { id:4, key:'w_wave',     emoji:'🌊', cleared:false, isLoop:false, bestRecord:null, bestEndlessRecord:null,
    sY(x){ let t=constrain((x-COUNTER_L)/(counterRight()-COUNTER_L),0,1); return GAME_H*0.62-sin(t*PI*2)*80+sin(t*PI)*20; }
  },
  { id:5, key:'loop',       emoji:'🎢', cleared:false, isLoop:true, bestRecord:null, bestEndlessRecord:null,
    sY(x){ return GAME_H*0.65; }   // フラット（customer配置用）

function smoothstep(e0,e1,x){ let t=constrain((x-e0)/(e1-e0),0,1); return t*t*(3-2*t); }
function counterRight(){ return GAME_W-COUNTER_R_PAD; }
function stageSY(x){
  // mirrorMode時はカウンター内でx座標を反転してsYを取得
  if(mirrorMode){
    let sx = COUNTER_L + counterRight() - x;
    return STAGES[currentStage].sY(sx);
  }
  return STAGES[currentStage].sY(x);
}
function obstH(type){
  if(type==='bottle') return 38;
  // グラス系はy=カウンター面に設定し、描画側で上に伸ばす
  if(type==='wine1'||type==='wine2'||type==='wine3') return 0;
  if(type==='tumbler'||type==='shot') return 0;
  return 16;
}

// ================================================================
// LOOP PATH BUILDER
// ================================================================
function buildLoopPath(){
  let pts=[];
  let flatY=GAME_H*0.65;
  let R=min(GAME_H*0.185, 110);
  let cx=GAME_W*0.50;
  let cy=flatY-R;
  let step=3;
  let nLoop=180;

  if(!mirrorMode){
    // 通常：左→右
    // 1. 左フラット
    for(let x=COUNTER_L; x<=cx; x+=step) pts.push({x, y:flatY});
    loopEntryIdx=pts.length-1;
    // 2. ループ（右向き：底→右→上→左→底）
    for(let i=1; i<=nLoop; i++){
      let a=HALF_PI - TWO_PI*(i/nLoop);
      pts.push({ x: cx+R*cos(a), y: cy+R*sin(a) });
    }
    loopExitIdx=pts.length-1;
    // 3. 右フラット
    for(let x=cx+step; x<=counterRight(); x+=step) pts.push({x, y:flatY});
  } else {
    // mirror：右→左
    // 1. 右フラット（逆向き）
    for(let x=counterRight(); x>=cx; x-=step) pts.push({x, y:flatY});
    loopEntryIdx=pts.length-1;
    // 2. ループ（左向き：底→左→上→右→底、角度増加）
    for(let i=1; i<=nLoop; i++){
      let a=HALF_PI + TWO_PI*(i/nLoop);
      pts.push({ x: cx+R*cos(a), y: cy+R*sin(a) });
    }
    loopExitIdx=pts.length-1;
    // 3. 左フラット
    for(let x=cx-step; x>=COUNTER_L; x-=step) pts.push({x, y:flatY});
  }

  stagePath=pts;
}

const SAVE_KEY='barslider_records_v1';

function saveRecords(){
  try{
    let data=STAGES.map(st=>({
      cleared:st.cleared,
      bestRecord:st.bestRecord,           // 単一モードベスト
      bestEndlessRecord:st.bestEndlessRecord  // 連続モードベスト
    }));
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  }catch(e){}
}

function loadRecords(){
  try{
    let raw=localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    let data=JSON.parse(raw);
    data.forEach((d,i)=>{
      if(STAGES[i]){
        STAGES[i].cleared=d.cleared||false;
        STAGES[i].bestRecord=d.bestRecord||null;
        STAGES[i].bestEndlessRecord=d.bestEndlessRecord||null;
      }
    });
  }catch(e){}
}

function clearRecords(){
  try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
  STAGES.forEach(st=>{ st.cleared=false; st.bestRecord=null; st.bestEndlessRecord=null; });
}

function checkTitleWordHits(){
  if(!titleGlass.active) return;
  titleWords.forEach(w=>{
    if(!w.alive) return;
    let dx=titleGlass.x-w.x, dy=titleGlass.y-w.y;
    let d=sqrt(dx*dx+dy*dy);
    if(d < w.hitR){
      w.alive=false;
      let nx=dx/max(d,1), ny=dy/max(d,1);
      w.vx = titleGlass.vx*0.6 + nx*random(3,8);
      w.vy = titleGlass.vy*0.4 - random(2,7);
      w.va = random(-0.06, 0.06);
      playObstacleHit(w.kind==='neon');  // 文字ヒットSE
      for(let i=0;i<8;i++) parts.push({
        x:w.x+random(-20,20), y:w.y+random(-10,10),
        c:color(w.col[0],w.col[1],w.col[2]),
        vx:random(-5,5), vy:random(-6,0),
        r:random(2,4), alpha:200
      });
    }
  });
}

function drawAndUpdateTitleWords(pulse){

      w.vy+=GRAVITY*0.6; w.vx*=0.99; w.x+=w.vx; w.y+=w.vy; w.angle+=w.va;
      if(w.y>GAME_H+60) return; // 画面外は描画スキップ
    }
    push();
    translate(w.x, w.y);
    rotate(w.angle);
    if(w.kind==='neon'){
      let a=w.alive?pulse:0.6;
      for(let i=7;i>0;i--){ fill(w.col[0],w.col[1],w.col[2],i*16*a); noStroke(); textSize(w.sz+i*0.8); text(w.txt,0,0); }
    } else if(w.kind==='lang_btn'){
      let isActive = (w.langKey===lang);
      let alpha_fade2 = w.alive ? 1.0 : constrain(map(w.y, GAME_H*0.5, GAME_H+60, 1.0, 0.0), 0, 1);
      let a = w.alive ? (isActive?1.0:0.6) : 0.4*alpha_fade2;
      fill(w.col[0],w.col[1],w.col[2],220*a); noStroke(); textSize(w.sz); textStyle(isActive?BOLD:NORMAL);
      text(w.txt,0,0); textStyle(NORMAL);
    } else if(w.kind==='italic'){
      fill(w.col[0],w.col[1],w.col[2], w.alive?(180+sin(titleAnim)*40):160);
      noStroke(); textStyle(ITALIC); textSize(w.sz); text(w.txt,0,0); textStyle(NORMAL);
    } else if(w.kind==='button_label'){
      fill(w.col[0],w.col[1],w.col[2], w.alive?200:180);
      noStroke(); textStyle(BOLD); textSize(w.sz); text(w.txt,0,0); textStyle(NORMAL);
    } else if(w.kind==='hint'){
      // ヒントテキスト：点滅なし・固定輝度
      fill(w.col[0],w.col[1],w.col[2], w.alive?190:120);

    } else {
      fill(w.col[0],w.col[1],w.col[2]); noStroke(); textSize(w.sz); text(w.txt,0,0);
    }
    pop();
  });
}

      let dispH=b.h*1.4;  // 表示高さ（棚に合わせたスケール）
      let dispW=dispH*(sp.sw/sp.sh);
      imageMode(CENTER);
      drawingContext.globalAlpha=globalA;
      image(imgs.bottles, 0, -dispH/2, dispW, dispH, sp.sx, sp.sy, sp.sw, sp.sh);
      drawingContext.globalAlpha=1.0;
      imageMode(CORNER);
    } else {
      // フォールバック：旧p5.js描画（v1.91互換）
      colorMode(RGB,255); rectMode(CORNER); noStroke();
      let bc=b.col;
      fill(bc[0],bc[1],bc[2],Math.round(210*globalA));
      rect(-b.w/2,-b.h, b.w, b.h*0.72, 2);
      rect(-2.5, -b.h*0.96, 5, b.h*0.32, 1);
      fill(bc[0]+18,bc[1]+18,bc[2]+18,Math.round(80*globalA));
      rect(-b.w/2+1,-b.h*0.52,b.w-2,b.h*0.22,1);
      fill(220,205,175,Math.round(95*globalA));
      rect(-b.w/2+0.5,-b.h*0.48,b.w-1,b.h*0.26,1);
    }
    pop();
  });
}

function updateShelfBottles(){
  shelfBottles.forEach(b=>{
    if(b.on || b.alpha<=0) return;
    b.x+=b.vx; b.y+=b.vy;
    b.vy+=0.5; b.vx*=0.97; b.angle+=b.va;
    b.alpha=max(0, b.alpha-6);  // 速めにフェード
  });
}

function checkShelfBottleHits(){
  if(!g.airborne) return;
  shelfBottles.forEach(b=>{
    if(!b.on) return;
    let bTopY=b.baseY-b.h;
    if(abs(g.x-b.x)<b.w*1.8 && g.y+GLASS_H>bTopY && g.y<b.baseY+4){
      b.on=false;
      b.vx=g.vx*0.5+sgn(g.vx)*random(1,4);
      b.vy=-random(3,8); b.va=random(-0.18,0.18);
      g.vx*=0.97; g.vy*=0.94;  // 減衰最小化（空中の自由度優先）
      shakeAmt=3;
      spawnParts(b.x,b.baseY-b.h/2,color(b.col[0],b.col[1],b.col[2]),5);
      playObstacleHit(true);
      score+=50;
      spawnFloatingText(b.x, b.baseY-b.h-10, '+50', [255,215,0]);
    }
  });
}

function drawTitleScreen(){
  let pulse=sin(titleAnim*1.2)*0.3+0.7;

  // 言語ボタン枠＋✓（左上・縦並び・English上）
  ['en','ja'].forEach((l,i)=>{
    let bx=10, by=14+i*44, bw=100, bh=38;
    let isActive=lang===l;
    push();
    stroke(isActive?color(255,215,0):color(100,100,100), isActive?220:100);
    strokeWeight(isActive?2:1);
    fill(isActive?color(40,32,0):color(15,15,25), isActive?190:80);
    rect(bx,by,bw,bh,7);

    pop();
  });

  // 文字オブジェクトを描画・物理更新
  drawAndUpdateTitleWords(pulse);

  // タイトルグラス（射出済みなら追従、未射出ならアニメ位置）
  if(!titleGlass.active && !titleGlass.gone){
    titleGlass.x=GAME_W/2+sin(titleAnim*0.7)*120;
    titleGlass.y=GAME_H*0.54+sin(titleAnim*1.1)*12;
  }
  if(!titleGlass.gone){
    drawAnimGlass(titleGlass.x, titleGlass.y, titleGlass.angle||0);
  }

  // ドラッグ中のUI表示
  if(titleDragging && !titleGlass.active){
    let ddx=mouseX-tdStartX, ddy=mouseY-tdStartY;
    let d=constrain(sqrt(ddx*ddx+ddy*ddy),0,MAX_DRAG);
    let pct=constrain(d/(MAX_DRAG*0.5),0,2.0);
    let pCol=pct<=1.0?lerpColor(color(50,220,100),color(255,200,0),pct):lerpColor(color(255,200,0),color(255,45,45),pct-1.0);
    stroke(255,255,255,70); strokeWeight(1.5); line(titleGlass.x,titleGlass.y,tdStartX,tdStartY);
    stroke(red(pCol),green(pCol),blue(pCol),200); fill(red(pCol),green(pCol),blue(pCol),200); strokeWeight(2.5);
    drawArrow(titleGlass.x,titleGlass.y,titleGlass.x-ddx*0.8,titleGlass.y-ddy*0.8);
    noFill(); stroke(255,215,0,80); strokeWeight(1.5); circle(titleGlass.x,titleGlass.y,d*0.72);
    fill(red(pCol),green(pCol),blue(pCol),215); noStroke(); textSize(13); textStyle(BOLD);
    text(floor(pct*100)+'%', titleGlass.x, titleGlass.y - 28); textStyle(NORMAL);
    // タイトルグラスのチャージ音
    let tier=pct<0.67?0:pct<1.34?1:pct<1.98?2:3;
    if(tier>0 && tier>lastChargeTier) playCharge(tier);
    lastChargeTier=tier;
  }

  // PLAY START ボタン枠だけ描画（ラベルはwordオブジェクトが担当）
  let bw=240,bh=52,bx=GAME_W/2-120,by=GAME_H*0.68;
  let hovBtn=mouseX>bx&&mouseX<bx+bw&&mouseY>by&&mouseY<by+bh;
  push();
  if(hovBtn){ fill(255,180,0,38); noStroke(); rect(bx-4,by-4,bw+8,bh+8,14); }
  stroke(255,180,0, hovBtn?230:150); strokeWeight(hovBtn?2.5:1.5);
  fill(255,180,0, hovBtn?32:16); rect(bx,by,bw,bh,10);
  pop();
}

function drawAnimGlass(x,y,angle=0){
  push(); translate(x,y); rotate(angle);
  stroke(188,212,255,130); strokeWeight(1.5); noFill();
  beginShape(); vertex(-GLASS_W/2,GLASS_H); vertex(-GLASS_W/2-3,0); vertex(GLASS_W/2+3,0); vertex(GLASS_W/2,GLASS_H); endShape(CLOSE);
  let fh=GLASS_H*0.75; noStroke(); fill(212,152,32,155);
  beginShape(); vertex(-GLASS_W/2+1,GLASS_H-1); vertex(-GLASS_W/2-1,GLASS_H-fh); vertex(GLASS_W/2+1,GLASS_H-fh); vertex(GLASS_W/2-1,GLASS_H-1); endShape(CLOSE);
  fill(238,232,215,200); ellipse(0,GLASS_H-fh,GLASS_W-2,6); pop();
}

function updateTitleGlass(){
  if(!titleGlass.active) return;
  titleGlass.vy+=GRAVITY; titleGlass.vx*=AIR_FRICTION;
  titleGlass.x+=titleGlass.vx; titleGlass.y+=titleGlass.vy;
  titleGlass.angle=(titleGlass.angle||0)+titleGlass.vx*0.025;

  checkTitleWordHits();

    titleGlass.gone=true; titleGlass.active=false;

    setTimeout(()=>{ titleGlass={x:0,y:0,vx:0,vy:0,active:false,gone:false,angle:0}; },1200);
  }
}

function drawStageWords(){
  stageWords.forEach(w=>{
    if(!w.alive && w.y > GAME_H+80) return;  // 画面外は描画スキップ
    let alpha_fade = w.alive ? 1.0 : constrain(map(w.y, GAME_H*0.5, GAME_H+60, 1.0, 0.0), 0, 1);
    push();
    translate(w.x, w.y);
    rotate(w.angle);
    if(w.kind==='neon_stage'){
      let a=w.alive?0.9:0.5*alpha_fade;
      for(let i=7;i>0;i--){ fill(w.col[0],w.col[1],w.col[2],i*16*a); noStroke(); textSize(w.sz+i*0.6); text(w.txt,0,0); }
    } else if(w.kind==='thanks'){
      // ゴールドネオン風
      let a=w.alive?(0.7+sin(titleAnim*1.4)*0.3):0.5*alpha_fade;
      for(let i=6;i>0;i--){ fill(w.col[0],w.col[1],w.col[2],i*18*a); noStroke(); textSize(w.sz+i*0.5); text(w.txt,0,0); }
    } else {
      let baseAlpha = {
        card_clear:230, card_label:220, card_stat:210, card_score:230,
        card_dash:110, stage_emoji:255, stage_name:220, stage_sub:170,
        btn_text:200, tab_text:230, ui_text:170, reset_text:220, card_stars:230, mirror_toggle:230
      }[w.kind] || 200;
      let a = w.alive ? baseAlpha : baseAlpha*alpha_fade*0.7;
      fill(w.col[0],w.col[1],w.col[2], a); noStroke();
      if(w.kind==='stage_name'||w.kind==='card_clear'||w.kind==='card_score'||w.kind==='tab_text'||w.kind==='card_label'||w.kind==='stage_emoji'||w.kind==='card_stars'){

function checkStageWordHits(sg){
  // sg指定あり：そのグラスのみ、なし：全グラスを走査
  let targets = sg ? [sg] : stageGlasses.filter(g=>g.active);
  targets.forEach(tsg=>{
    stageWords.forEach(w=>{
      if(!w.alive) return;
      let wx=w.x, wy=w.y;
      let dx=tsg.x-wx, dy=tsg.y-wy;
      let d=sqrt(dx*dx+dy*dy);
      if(d < w.hitR){
        w.alive=false;
        let nx=dx/max(d,1), ny=dy/max(d,1);
        w.vx=tsg.vx*0.5+nx*random(2,6);
        w.vy=tsg.vy*0.3-random(1,6);
        w.va=random(-0.09, 0.09);
        if(w.kind==='thanks'){
          playStageClear();
          if(typeof gtag==='function') gtag('event','thankyou_blown');
        } else playObstacleHit(w.kind==='neon_stage');
        for(let i=0;i<5;i++) parts.push({
          x:wx+random(-12,12), y:wy+random(-6,6),
          c:color(w.col[0],w.col[1],w.col[2]),
          vx:random(-5,5), vy:random(-6,0),
          r:random(2,4), alpha:190
        });
      }
    });
  });
}

// グラスのベース位置：←タイトルとモードタブの間

const SG_BASES=[
  // [0] 元のグラス: ←タイトルとモードタブの間
  ()=>({x: 228+sin(titleAnim*0.7)*22,        y: GAME_H*0.912+sin(titleAnim*1.1)*5}),
  // [1] 左中段
  ()=>({x: 22+sin(titleAnim*0.9)*6,          y: GAME_H*0.52+sin(titleAnim*1.3)*8}),
  // [2] 右中段
  ()=>({x: GAME_W-22+sin(titleAnim*0.8)*6,   y: GAME_H*0.52+sin(titleAnim*1.2)*8}),
  // [3] 下部中央右 (SE音量スライダーの左)
  ()=>({x: 660+sin(titleAnim*1.0)*10,        y: GAME_H*0.912+sin(titleAnim*0.9)*5}),
];

function initStageGlasses(){
  stageGlasses = SG_BASES.map(fn=>{
    let p=fn(); return {x:p.x, y:p.y, vx:0, vy:0, active:false, gone:false, angle:0};
  });
}
// 後方互換エイリアス（旧コードの stageGlass → stageGlasses[0]）
function stageGlassBaseX(){ return SG_BASES[0]().x; }
function stageGlassBaseY(){ return SG_BASES[0]().y; }

function updateStageGlass(){
  stageGlasses.forEach((sg,i)=>{
    if(!sg.active) return;
    sg.vy+=GRAVITY; sg.vx*=AIR_FRICTION;
    sg.x+=sg.vx; sg.y+=sg.vy;
    sg.angle=(sg.angle||0)+sg.vx*0.025;
    checkStageWordHits(sg);
    if(sg.y>GAME_H+60||sg.x<-100||sg.x>GAME_W+100){
      sg.gone=true; sg.active=false;
      let idx=i;
      setTimeout(()=>{
        let p=SG_BASES[idx]();
        stageGlasses[idx]={x:p.x,y:p.y,vx:0,vy:0,active:false,gone:false,angle:0};
      },1200);
    }
  });
}

function drawStageGlass(){
  if(!stageGlassUnlocked) return;
  stageGlasses.forEach((sg,gi)=>{
    if(sg.gone) return;
    let gx=sg.x, gy=sg.y;
    if(!sg.active){
      let p=SG_BASES[gi](); gx=p.x; gy=p.y;
      let rp=sin(titleAnim*0.08)*0.5+0.5;
      noFill(); stroke(255,180,60,30+rp*40); strokeWeight(1.2);
      circle(gx, gy+GLASS_H/2, 36+rp*6);
    }
    push(); translate(gx, gy); rotate(sg.angle||0);
    stroke(188,212,255,140); strokeWeight(1.5); noFill();
    beginShape(); vertex(-GLASS_W/2,GLASS_H); vertex(-GLASS_W/2-3,0); vertex(GLASS_W/2+3,0); vertex(GLASS_W/2,GLASS_H); endShape(CLOSE);
    let fh=GLASS_H*0.65; noStroke(); fill(212,152,32,160);
    beginShape(); vertex(-GLASS_W/2+1,GLASS_H-1); vertex(-GLASS_W/2-1,GLASS_H-fh); vertex(GLASS_W/2+1,GLASS_H-fh); vertex(GLASS_W/2-1,GLASS_H-1); endShape(CLOSE);
    fill(238,232,215,190); ellipse(0,GLASS_H-fh,GLASS_W-2,6);
    // ドラッグ中UI（このグラスがドラッグ中なら）
    if(sgDragIdx===gi){
      let ddx=mouseX-sgStartX, ddy=mouseY-sgStartY;
      let d=constrain(sqrt(ddx*ddx+ddy*ddy),0,MAX_DRAG);
      let pct=constrain(d/(MAX_DRAG*0.5),0,2.0);
      let pCol=pct<=1.0?lerpColor(color(50,220,100),color(255,200,0),pct):lerpColor(color(255,200,0),color(255,45,45),pct-1.0);
      stroke(255,255,255,60); strokeWeight(1.5); line(0,GLASS_H/2,ddx,ddy);
      let tx=-(ddx)*0.8, ty=GLASS_H/2-(ddy)*0.8;
      stroke(red(pCol),green(pCol),blue(pCol),180); fill(red(pCol),green(pCol),blue(pCol),180); strokeWeight(2);
      line(0,GLASS_H/2,tx,ty);
      let ang=atan2(ty-GLASS_H/2,tx); push(); translate(tx,ty); rotate(ang); noStroke(); triangle(0,0,-10,-4,-10,4); pop();
      noFill(); stroke(255,215,0,70); strokeWeight(1.2); circle(0,GLASS_H/2,d*0.7);
      fill(red(pCol),green(pCol),blue(pCol),200); noStroke(); textSize(12); textStyle(BOLD);
      text(floor(pct*100)+'%', 0, -14); textStyle(NORMAL);
      let tier=pct<0.67?0:pct<1.34?1:pct<1.98?2:3;
      if(tier>0 && tier>lastChargeTier) playCharge(tier);
      lastChargeTier=tier;
    }
    pop();
  });
}

function stageGlassPress(px,py){
  if(!stageGlassUnlocked) return false;
  for(let gi=0; gi<stageGlasses.length; gi++){
    let sg=stageGlasses[gi];
    if(sg.active||sg.gone) continue;
    let p=SG_BASES[gi]();
    let dx=px-p.x, dy=py-(p.y+GLASS_H/2);
    if(sqrt(dx*dx+dy*dy)<52){ sgDragIdx=gi; sgStartX=px; sgStartY=py; return true; }
  }
  return false;
}

function stageGlassRelease(){
  let gi2=sgDragIdx; sgDragIdx=-1;
  if(gi2<0) return;
  let ddx=mouseX-sgStartX, ddy=mouseY-sgStartY;
  let d=sqrt(ddx*ddx+ddy*ddy);
  if(d<MIN_DRAG){ lastChargeTier=0; return; }
  let spd=constrain(d,MIN_DRAG,MAX_DRAG);
  let speed=map(spd,MIN_DRAG,MAX_DRAG,1.2,MAX_SPEED);
  let p=SG_BASES[gi2]();
  let sg=stageGlasses[gi2];
  sg.x=p.x; sg.y=p.y;
  sg.vx=-(ddx/d)*speed;
  sg.vy=-(ddy/d)*speed;
  sg.active=true;
  playLaunch(map(spd,MIN_DRAG,MAX_DRAG,0,200));
  lastChargeTier=0;
}

  let mtx=RST_X-148, mty=RST_Y-2, mtw=100, mth=RST_H+4;
  push();
  stroke(mirrorMode?color(100,220,255):color(100,100,140), mirrorMode?220:100);
  strokeWeight(mirrorMode?2:1);
  fill(mirrorMode?color(0,30,55):color(15,15,30), mirrorMode?200:100);
  rect(mtx,mty,mtw,mth, mirrorMode?[8,8,0,0]:[8,8,8,8]); pop();

  // リセット確認タイマー更新
  if(resetConfirmTimer>0){
    resetConfirmTimer--;
    if(resetConfirmTimer===0) resetConfirm=false;
  }

  // モード切替タブ（枠＋下線のみ：テキストはstageWords）
  let modeIsEndless=gameMode==='endless';
  let tabW=160, tabH=32, tabY=GAME_H*0.895;
  let tab1x=GAME_W/2-tabW-4, tab2x=GAME_W/2+4;

  strokeWeight(!modeIsEndless?2:1);
  fill(!modeIsEndless?color(40,32,0):color(15,15,30), !modeIsEndless?200:100);
  rect(tab1x,tabY,tabW,tabH, !modeIsEndless?[8,8,0,0]:[8,8,8,8]);
  stroke(modeIsEndless?color(100,200,255):color(100,100,140), modeIsEndless?220:100);
  strokeWeight(modeIsEndless?2:1);
  fill(modeIsEndless?color(10,30,55):color(15,15,30), modeIsEndless?200:100);
  rect(tab2x,tabY,tabW,tabH, modeIsEndless?[8,8,0,0]:[8,8,8,8]);
  // タブ下線（常に残る）
  stroke(modeIsEndless?color(100,200,255):color(255,215,0)); strokeWeight(2); noFill();

const KANBAN_SCALE=1.25;  // 看板描画スケール（1.0=ロープ:板比率通り）
// ステージセレクト レイアウト定数
const SS_CARD_W=280, SS_CARD_H=150, SS_ROW_GAP=24;

// SS_START_Y: ロープがy=0から始まるようropeH2と一致させる

// 看板レイアウト計算（KANBAN_SCALE適用）
function kanbanLayout(x,y,w,h){
  let baseH=h+floor(h*(159/215));
  let kH=floor(baseH*KANBAN_SCALE);
  let kW=floor(kH*(500/420));
  let ropeH2=floor(h*(159/215)*KANBAN_SCALE);
  let kX=x-floor((kW-w)/2);
  let kY=y-ropeH2;
  let boardDstY=kY+floor(kH*160/420);
  let boardDstH=kH-floor(kH*160/420);
  return {kH,kW,kX,kY,boardDstY,boardDstH};
}

function drawCounter(){

function drawStraightCounter(){
  let CR=counterRight(), pts=[];
  for(let x=COUNTER_L;x<=CR;x+=4) pts.push({x,y:stageSY(x)});

  if(blastHoles.length>0){
    // 穴あけモード：オフスクリーンに描いてdestination-outで穴を抜く
    let g2=createGraphics(GAME_W, GAME_H);
    g2.noStroke(); g2.fill(46,24,6);
    g2.beginShape(); pts.forEach(p=>g2.vertex(p.x,p.y+14)); g2.vertex(CR,GAME_H); g2.vertex(COUNTER_L,GAME_H); g2.endShape(CLOSE);
    for(let i=1;i<11;i++){ g2.stroke(38,18,4,52+i*5); g2.strokeWeight(1); g2.noFill(); g2.beginShape(); pts.forEach(p=>{let gy2=p.y+18+i*16;if(gy2<GAME_H)g2.vertex(p.x,gy2);}); g2.endShape(); }
    g2.stroke(92,55,18); g2.strokeWeight(16); g2.noFill(); g2.beginShape(); pts.forEach(p=>g2.vertex(p.x,p.y+7)); g2.endShape();
    g2.stroke(155,110,45,170); g2.strokeWeight(2.5); g2.noFill(); g2.beginShape(); pts.forEach(p=>g2.vertex(p.x,p.y)); g2.endShape();
    g2.stroke(215,185,105,50); g2.strokeWeight(1); g2.noFill(); g2.beginShape(); pts.forEach(p=>g2.vertex(p.x,p.y-3)); g2.endShape();
    g2.stroke(35,16,4); g2.strokeWeight(1); g2.fill(38,20,6);
    g2.beginShape(); g2.vertex(COUNTER_L,stageSY(COUNTER_L)+14); g2.vertex(CR,stageSY(CR)+14); g2.vertex(CR,stageSY(CR)+30); g2.vertex(COUNTER_L,stageSY(COUNTER_L)+30); g2.endShape(CLOSE);
    // 穴を抜く
    g2.drawingContext.globalCompositeOperation='destination-out';
    g2.noStroke();
    blastHoles.forEach(h=>{
      // 楕円形の穴（横長）
      g2.fill(0); g2.ellipse(h.x, h.y, h.r*2.2, h.r*1.1);
      // 穴の縁にさらに深い部分
      g2.ellipse(h.x, h.y+4, h.r*1.6, h.r*0.7);
    });
    g2.drawingContext.globalCompositeOperation='source-over';
    // 穴の縁の暗い影を描く（深さ表現）
    blastHoles.forEach(h=>{
      g2.noStroke(); g2.fill(15,7,2,180);
      g2.ellipse(h.x+2, h.y+3, h.r*1.8, h.r*0.85);
    });
    // 本画面に転写
    image(g2, 0, 0);
    g2.remove();
  } else {
    // 通常描画

      let swR=(frameCount%40)/40;  // 0→1 繰り返し
      noFill(); stroke(255,80,0, 200*(1-swR)); strokeWeight(3*(1-swR)+1);
      circle(g.x, g.y+GLASS_H/2, 30+swR*80);
    } else {
      fill(red(pCol),green(pCol),blue(pCol),215); noStroke(); textSize(20); textStyle(BOLD);
      text(dispPct+'%', g.x, g.y-30); textStyle(NORMAL);
      if(pct>=1.9){ fill(255,45,45,170+sin(frameCount*0.3)*60); textSize(13); text('MAX!', g.x, g.y-52); }
    }
    // チャージ音
    let tier=pct<0.67?0:pct<1.34?1:pct<1.98?2:3;
    if(tier>0 && tier>lastChargeTier) playCharge(tier);
    lastChargeTier=tier;
    // 500%チャージ判定：超引っ張り OR 200%を5秒維持
    if(!is500shot){
      let rawDist=sqrt(ddx*ddx+ddy*ddy);
      if(rawDist > MAX_DRAG*1.3){
        is500shot=true; chargeHoldFrames=0;
        playCharge(3); playCharge(3);
      } else if(pct>=1.98){
        chargeHoldFrames++;
        if(chargeHoldFrames>=300){ is500shot=true; chargeHoldFrames=0; playCharge(3); playCharge(3); }
      } else {
        chargeHoldFrames=0;
      }
    } else {
      // 500%達成後も引っ張りをほぼ戻したらキャンセル（~197%以下）
      if(pct < 1.97){
        is500shot=false; chargeHoldFrames=0;
      }
    }
  }
}

// 着地ゾーン判定
const DELIVER_SPEED=7.0;   // 全客共通の許容速度（バカゲー判定）
const ZONE_HIT=ZONE_W+14;  // 判定幅（表示より少し広め）
const VX_HIST=5;

function trackVx(){
  // ループはpathSpeedをピクセル換算（1パス点≒3px）して通常ステージと単位を統一
  let v=loopMode ? abs(pathSpeed)*3 : abs(g.vx);
  vxHistory.push(v);
  if(vxHistory.length>VX_HIST) vxHistory.shift();
}

function avgSpeed(){
  // フォールバックもtrackVxと同じpx換算で統一
  if(vxHistory.length===0) return loopMode ? abs(pathSpeed)*3 : abs(g.vx);
  return vxHistory.reduce((a,b)=>a+b,0)/vxHistory.length;
}

function findHitCustomer(){
  let spd=avgSpeed();
  let best=-1, bestDist=Infinity;
  // 空中（airborne）のグラスは判定しない：着地後のみ配達可能
  if(g.airborne) return -1;
  custs.forEach((c,i)=>{
    let d=abs(g.x-c.x);
    if(d<ZONE_HIT && spd<DELIVER_SPEED && d<bestDist){ bestDist=d; best=i; }
  });
  return best;
}

  blastWords.forEach(bw=>{
    if(!bw.blown) return;
    bw.x+=bw.vx; bw.y+=bw.vy; bw.vy+=0.3; bw.vx*=0.97; bw.angle+=bw.va;
    let a=constrain(map(bw.y,GAME_H*0.3,GAME_H+40,255,0),0,255);
    if(a<=0) return;
    push(); translate(bw.x,bw.y); rotate(bw.angle);
    fill(bw.col[0],bw.col[1],bw.col[2],a); noStroke(); textSize(bw.sz); textStyle(BOLD);
    text(bw.txt,0,0); textStyle(NORMAL); pop();
  });
}

function drawArrow(x1,y1,x2,y2){ line(x1,y1,x2,y2); let ang=atan2(y2-y1,x2-x1); push(); translate(x2,y2); rotate(ang); noStroke(); triangle(0,0,-12,-5,-12,5); pop(); }
function drawParticles(){ noStroke(); parts.forEach(p=>{ fill(red(p.c),green(p.c),blue(p.c),p.alpha); circle(p.x,p.y,p.r*2); }); }

// ================================================================
// PHYSICS — 通常
// ================================================================
function physicsStep(){
  if(g.done) return;

  // 500%ブラストモード
  if(blast500Mode){
    let gx=g.x, gy=g.y;
    let bR=90;
    // カウンター面に穴を開ける
    let surf=stageSY(gx);
    if(gy+GLASS_H > surf-20 && gy < surf+40 && gx>COUNTER_L && gx<counterRight()){
      let tooClose=blastHoles.some(h=>dist(gx,gy,h.x,h.y)<30);
      if(!tooClose){
        blastHoles.push({x:gx, y:surf+7, r:28+random(-6,6)});
        for(let i=0;i<10;i++) parts.push({
          x:gx+random(-20,20), y:surf+random(-5,15),
          c:color(92+random(-20,20),55+random(-10,10),18),
          vx:random(-6,6), vy:random(-8,-1),
          r:random(2,6), alpha:220
        });
        shakeAmt=max(shakeAmt,5);
      }
    }
    // 波動拳トレイル
    hadoukenTrail.push({x:gx,y:gy,r:20,alpha:200,col:color(255,80,0)});
    if(hadoukenTrail.length>20) hadoukenTrail.shift();
    // カスタマー吹っ飛ばし
    blastCustomers.forEach(bc=>{
      if(bc.blown) return;
      if(sqrt((gx-bc.x)**2+(gy-bc.y)**2)<bR){
        bc.blown=true;
        // 上方向メイン＋左右ランダム少々＋強めの回転
        bc.vx=(mirrorMode?-1:1)*random(-4,4);
        bc.vy=-random(10,16);
        bc.va=random(-0.18,0.18);
        spawnParts(bc.x,bc.y,color(210,170,130),14); shakeAmt=10; playObstacleHit(false);
      }
    });
    // HUDテキスト吹っ飛ばし
    blastWords.forEach(bw=>{
      if(bw.blown) return;
      if(sqrt((gx-bw.x)**2+(gy-bw.y)**2)<bR+40){
        bw.blown=true;
        bw.vx=g.vx*0.4+random(-3,3);
        bw.vy=g.vy*0.3-random(2,6);
        bw.va=random(-0.1,0.1);
        for(let i=0;i<6;i++) parts.push({x:bw.x+random(-20,20),y:bw.y+random(-5,5),
          c:color(bw.col[0],bw.col[1],bw.col[2]),vx:random(-4,4),vy:random(-5,0),r:random(2,4),alpha:180});
      }
    });
    // 障害物・棚ボトル
    obs.forEach(o=>{ if(o.on&&dist(gx,gy,o.x,o.y)<bR) hitObs(o); });
    shelfBottles.forEach(b=>{ if(!b.blown&&b.on!==false&&abs(gx-b.x)<bR&&abs(gy-b.baseY)<bR){
      b.vx=g.vx*0.5+random(-3,3); b.vy=-random(4,9); b.va=random(-0.15,0.15);
      b.on=false; b.blown=true;
      playObstacleHit(true);
      spawnParts(b.x,b.baseY-b.h/2,color(b.col[0],b.col[1],b.col[2]),5);
      score+=50; spawnFloatingText(b.x,b.baseY-b.h-10,'+50',[255,215,0]);
    }});
  }

  if(loopMode){ physicsStepLoop(); return; }
  if(g.airborne){
    g.vy+=GRAVITY; g.vx*=AIR_FRICTION;
    g.x+=g.vx; g.y+=g.vy;
    travelDist+=abs(g.vx)+abs(g.vy);
    g.angle+=g.vx*0.018;
    trackVx();
    let CR=counterRight();
    let leftBound  = blast500Mode ? COUNTER_L-300 : COUNTER_L-40;
    let rightBound = blast500Mode ? CR+600       : CR+60;
    let bottomBound= blast500Mode ? GAME_H+200    : GAME_H+60;
    if(g.x<leftBound||g.x>rightBound||g.y>bottomBound){ finishRound(); return; }
    // 着地判定（blast500Mode時はスキップ：地面を突き抜けて飛び続ける）
    if(!blast500Mode){
      let surf=stageSY(g.x)-GLASS_H;
      if(g.y>=surf&&g.vy>0){
        g.y=surf; g.vy=0; g.vx*=0.75; g.airborne=false;
        shakeAmt=4; spawnParts(g.x,g.y+GLASS_H,color(180,160,255),6); playLand();
      }
    }
    obs.forEach(o=>{ if(o.on&&abs(g.x-o.x)<22&&abs(g.y-o.y)<22) hitObs(o); });
    // 配達判定（blast500Mode時はスキップ：お客さんに当たっても止まらない）
    if(!blast500Mode && travelDist>60){
      let hit=findHitCustomer();
      if(hit>=0){ deliverTo(hit); return; }
    }
  } else {
    let slope=stageSY(g.x+1)-stageSY(g.x);
    g.vx+=slope*SLOPE_FACTOR; g.vx*=FRICTION;
    g.x+=g.vx; g.y=stageSY(g.x)-GLASS_H;
    travelDist+=abs(g.vx);
    g.angle=lerp(g.angle,-g.vx*0.024,0.12);
    trackVx();
    obs.forEach(o=>{ if(o.on&&abs(g.x-o.x)<20) hitObs(o); });
    if(!blast500Mode && travelDist>60){
      let hit=findHitCustomer();
      if(hit>=0){ deliverTo(hit); return; }
    }
    let CR=counterRight();
    if(!mirrorMode && g.x>CR+10) finishRound();
    else if(mirrorMode && g.x<COUNTER_L-10) finishRound();
    else if(!mirrorMode && g.x<COUNTER_L+20&&travelDist>100) finishRound();
    else if(mirrorMode && g.x>CR-20&&travelDist>200) finishRound();
    else if(!blast500Mode && abs(g.vx)<0.35&&travelDist>80) finishRound();
  }
}

// ================================================================
// PHYSICS — ループ（パス追従 + 空中対応）
// ================================================================
function physicsStepLoop(){
  if(g.done) return;
  // 500%ブラスト：ループでも全オブジェクト吹っ飛ばし
  if(blast500Mode){
    let gx=g.x, gy=g.y; let bR=90;
    hadoukenTrail.push({x:gx,y:gy,r:20,alpha:200,col:color(255,80,0)});
    if(hadoukenTrail.length>20) hadoukenTrail.shift();
    blastCustomers.forEach(bc=>{
      if(bc.blown) return;
      if(sqrt((gx-bc.x)**2+(gy-bc.y)**2)<bR){
        bc.blown=true; bc.vx=random(-4,4); bc.vy=-random(10,16); bc.va=random(-0.18,0.18);
        spawnParts(bc.x,bc.y,color(210,170,130),14); shakeAmt=10; playObstacleHit(false);
      }
    });
    blastWords.forEach(bw=>{
      if(bw.blown) return;
      if(sqrt((gx-bw.x)**2+(gy-bw.y)**2)<bR+40){
        bw.blown=true; bw.vx=pathSpeed*0.8+random(-3,3); bw.vy=-random(2,6); bw.va=random(-0.1,0.1);
      }
    });
    obs.forEach(o=>{ if(o.on&&dist(gx,gy,o.x,o.y)<bR) hitObs(o); });
    shelfBottles.forEach(b=>{ if(!b.blown&&b.on!==false&&abs(gx-b.x)<bR&&abs(gy-b.baseY)<bR){
      b.vx=pathSpeed*0.5+random(-3,3); b.vy=-random(4,9); b.va=random(-0.15,0.15);
      b.on=false; b.blown=true;
      playObstacleHit(true);
      spawnParts(b.x,b.baseY-b.h/2,color(b.col[0],b.col[1],b.col[2]),5);
      score+=50; spawnFloatingText(b.x,b.baseY-b.h-10,'+50',[255,215,0]);
    }});
  }

  // 空中中はフリー物理
  if(g.airborne){
    g.vy+=GRAVITY; g.vx*=AIR_FRICTION;
    g.x+=g.vx; g.y+=g.vy;
    travelDist+=abs(g.vx)+abs(g.vy);
    g.angle+=g.vx*0.018;
    let llBound=mirrorMode?COUNTER_L-300:COUNTER_L-40;
    let rrBound=mirrorMode?counterRight()+1000:counterRight()+60;
    if(g.x<llBound||g.x>rrBound||g.y>GAME_H+60){ finishRound(); return; }

    // パス着地判定：完全全点スキャン（v6オリジナル）
    // ループ面にも着地可能・g.vy>0（落下中）のみ判定
    if(stagePath.length>0){
      for(let i=0; i<stagePath.length-1; i++){
        let px=stagePath[i].x, py=stagePath[i].y;
        if(abs(g.x-px)<8 && g.y>=py-GLASS_H && g.vy>0){
          pathT=i; pathSpeed=mirrorMode?-g.vx*0.28:g.vx*0.28;
          g.y=py-GLASS_H; g.vx=0; g.vy=0; g.airborne=false;
          shakeAmt=5; spawnParts(g.x,g.y+GLASS_H,color(180,160,255),6); playLand();
          return;
        }
      }
    }

    obs.forEach(o=>{ if(o.on&&dist(g.x,g.y,o.x,o.y)<22) hitObs(o); });
    return;
  }

  // パス追従物理
  let n=stagePath.length;
  let iCurr=floor(constrain(pathT,0,n-2));
  let iNext=min(iCurr+1,n-1);

  if(!blast500Mode){
    let slopeDelta=(stagePath[iNext].y - stagePath[iCurr].y) * SLOPE_FACTOR * 0.6;
    pathSpeed+= slopeDelta;  // mirrorMode問わず同じ（重力はy座標差で決まる）
    pathSpeed*=FRICTION;
  }

  pathT+=pathSpeed;
  pathT=constrain(pathT,0,n-1);
  travelDist+=abs(pathSpeed);
  trackVx();

  let idx=floor(constrain(pathT,0,n-2));
  g.x=stagePath[idx].x;
  g.y=stagePath[idx].y-GLASS_H;

  // mirrorMode時はパスが逆方向なので進行方向ベクトルも逆
  let i2=min(idx+1,n-1), i0=max(idx-1,0);
  let fwd= mirrorMode
    ? {x:stagePath[i0].x-stagePath[idx].x, y:stagePath[i0].y-stagePath[idx].y}
    : {x:stagePath[i2].x-stagePath[idx].x, y:stagePath[i2].y-stagePath[idx].y};
  g.angle=lerp(g.angle,atan2(fwd.y,fwd.x),0.18);

  obs.forEach(o=>{ if(o.on&&dist(g.x,g.y+GLASS_H/2,o.x,o.y)<22) hitObs(o); });

  // ループ出口後のデリバー判定（mirror時もloopExitIdx基準でOK）
  if(!blast500Mode && pathT>loopExitIdx+10){
    let hit=findHitCustomer();
    if(hit>=0){ deliverTo(hit); return; }
  }

  if(pathT>=n-3){ finishRound(); return; }
  // mirrorMode時はパス末端が左端なので、pathT>=n-3で末端判定
  // 後退は通常と同じく pathSpeed の符号で判定
  let backCond = mirrorMode ? (pathT<=2&&pathSpeed>0&&travelDist>30) : (pathT<=2&&pathSpeed<0&&travelDist>10);
  if(backCond){ resultMsg=LL().result.stalled; roundOver(); return; }
  if(!blast500Mode && abs(pathSpeed)<0.25&&travelDist>30){ finishRound(); return; }
}

// ================================================================
// HIT / DELIVER / FINISH
// ================================================================
function hitObs(o){
  o.on=false;
  let spd=loopMode?pathSpeed:g.vx;
  o.vx=spd*0.65+sgn(spd)*random(2,5);
  o.vy=-random(5,10); o.va=random(-0.17,0.17);
  if(loopMode) pathSpeed*=0.97+random(-0.01,0.01);
  else g.vx*=0.97+random(-0.01,0.01);
  shakeAmt=6;
  let pc=o.type==='bottle'?color(38,155,55):o.type==='ashtray'?color(155,150,135):color(170,125,55);
  spawnParts(o.x,o.y,pc,12);
  playObstacleHit(false);
  // 障害物スコア +50
  score+=50;
  spawnFloatingText(o.x, o.y-20, '+50', [255,215,0]);
}

function deliverTo(idx){
  if(g.done) return;
  g.done=true; g.vx=0; g.vy=0; g.angle=0; g.airborne=false; pathSpeed=0;
  if(idx===targetIdx){
    score+=1000; roundsCleared++;
    custs[idx].face='😄'; custs[idx].happy=true; spawnParts(g.x,g.y,color(255,215,0),28); shakeAmt=3;
    playDeliver();
    spawnFloatingText(g.x, g.y-30, '+1000', [255,215,0]);
    if(gameMode==='endless'){
      streakCount++;
      resultMsg=LL().result.nice_serve_streak(streakCount);
    } else {
      resultMsg=LL().result.nice_serve;
    }
    lastDeliverySuccess=true;   // 成功フラグ
  } else {
    resultMsg=LL().result.wrong_person;
    custs[idx].face='😲'; custs[targetIdx].face='😤';
    lastDeliverySuccess=false;
  }
  checkStageEnd();
}

function finishRound(){
  if(g.done) return;
  if(blast500Mode){
    resultMsg=LL().result.blast;
    // blast500Mode=true のままにする（initRoundまでお客さん・文字を復活させない）
    g.done=true; g.vx=0; g.vy=0; pathSpeed=0;
    lastDeliverySuccess=false;
    checkStageEnd(); return;
  }
  if(loopMode){
    if(g.airborne && g.y>GAME_H)              resultMsg=LL().result.fell_floor;
    else if(!mirrorMode&&g.airborne && g.x>counterRight()) resultMsg=LL().result.fell_right;
    else if(mirrorMode &&g.airborne && g.x<COUNTER_L-40)   resultMsg=LL().result.fell_right;
    else if(!mirrorMode&&g.airborne && g.x<COUNTER_L-40)  resultMsg=LL().result.fell_left;
    else if(mirrorMode &&g.airborne && g.x>counterRight()) resultMsg=LL().result.fell_left;
    else if(pathT>=stagePath.length-3)        resultMsg=LL().result.loop_out;
    else if(abs(pathSpeed)<0.25)              resultMsg=LL().result.loop_stop;
    else                                       resultMsg=LL().result.not_reached;
  } else {
    if(g.y>GAME_H)              resultMsg=LL().result.fell_floor;
    else if(!mirrorMode&&g.x>counterRight()) resultMsg=LL().result.fell_right;
    else if(mirrorMode&&g.x<COUNTER_L-10)   resultMsg=LL().result.fell_right;
    else if(!mirrorMode&&g.x<COUNTER_L+30)  resultMsg=LL().result.fell_left;
    else if(mirrorMode&&g.x>counterRight()-30) resultMsg=LL().result.fell_left;
    else                         resultMsg=LL().result.not_reached;
  }
  custs[targetIdx].face='😤';
  g.done=true; g.vx=0; g.vy=0; pathSpeed=0;
  lastDeliverySuccess=false;
  checkStageEnd();
}

function roundOver(){
  g.done=true; g.vx=0; g.vy=0; pathSpeed=0;
  if(blast500Mode){ resultMsg=LL().result.blast; /* blast500Mode=true のまま保持 */ }
  else { custs[targetIdx].face='😤'; resultMsg=LL().result.stalled; }
  lastDeliverySuccess=false;
  checkStageEnd();
}

function checkStageEnd(){
  if(gameMode==='endless'){
    if(lastDeliverySuccess){
      S='RESULT';
    } else {
      endlessEnd();
    }
    return;
  }
  // 単一モード
  if(roundsCleared>=roundsNeeded){
    let st=STAGES[currentStage];
    st.cleared=true;
    // 投数ボーナス・星評価（単一モードのみ）
    lastThrowBonus=0; lastStars=0;
    if(gameMode==='single'){
      lastThrowBonus=calcThrowBonus(throwCount);
      score+=lastThrowBonus;
      lastStars=calcStars(throwCount);
    }
    let isNewRecord=false;
    if(!st.bestRecord){
      isNewRecord=true;
    } else {
      let fewer = throwCount < st.bestRecord.throws;
      let sameThrowsHigherScore = throwCount===st.bestRecord.throws && score>st.bestRecord.score;
      if(fewer||sameThrowsHigherScore) isNewRecord=true;
    }
    if(isNewRecord) st.bestRecord={score:score, throws:throwCount, stars:lastStars};
    saveRecords();
    // GA: ステージクリア（ファネル・平均投数・人気ステージ分析用）
    if(typeof gtag==='function') gtag('event','stage_clear',{
      stage_id: currentStage, stage_name: LL().stages[currentStage].name,
      throws: throwCount, score: score, is_new_record: isNewRecord
    });
    S='STAGE_CLEAR'; playStageClear();
  } else {
    // GA: ラウンド失敗・単一モードのみ到達（連続モードはendlessEndへ行くため）
    if(typeof gtag==='function') gtag('event','round_fail',{
      stage_id: currentStage, stage_name: LL().stages[currentStage].name,
      throws_so_far: throwCount, rounds_cleared: roundsCleared
    });
    S='RESULT';
  }
}

function endlessEnd(){
  let st=STAGES[currentStage];
  let isNew=false;
  if(!st.bestEndlessRecord){
    isNew=true;
  } else {
    let more = throwCount > st.bestEndlessRecord.throws;
    let sameTHigher = throwCount===st.bestEndlessRecord.throws && score>st.bestEndlessRecord.score;
    if(more||sameTHigher) isNew=true;
  }
  if(isNew) st.bestEndlessRecord={score:score, throws:throwCount, streak:streakCount, stars:streakCount>0?calcStarsEndless(throwCount):0};
  saveRecords();
  endlessIsNewRecord=isNew;
  // GA: 連続モード終了（連続記録・スコア）
  if(typeof gtag==='function') gtag('event','endless_end',{
    stage_id: currentStage, stage_name: LL().stages[currentStage].name,
    streak: streakCount, score: score, is_new_record: isNew
  });
  S='ENDLESS_END';
}

// 投数→★評価（単一モード）2投=★3、3〜4投=★2、5投以上=★1
function calcStars(throws){
  if(throws<=2) return 3;
  if(throws<=4) return 2;
  return 1;
}
// 投数→★評価（連続モード）1〜4投=★1、5〜9投=★2、10投以上=★3
function calcStarsEndless(throws){
  if(throws>=10) return 3;
  if(throws>=5)  return 2;
  return 1;
}
let lastStars=0; // STAGE_CLEAR表示用

// 投数ボーナス（単一モードのみ）
function calcThrowBonus(throws){
  if(throws<=2)  return 10000;
  if(throws<=4)  return 5000;
  if(throws<=7)  return 2000;
  if(throws<=10) return 1000;
  return 0;
}
let lastThrowBonus=0; // STAGE_CLEAR表示用

function obstacleStep(){ obs.forEach(o=>{ if(o.on)return; o.x+=o.vx; o.y+=o.vy; o.vy+=0.44; o.vx*=0.98; o.angle+=o.va; }); }
function spawnParts(x,y,c,n=12){ for(let i=0;i<n;i++) parts.push({x,y,c,vx:random(-6,6),vy:random(-9,0.5),r:random(2,5),alpha:255}); }
function particleStep(){ parts=parts.filter(p=>p.alpha>4); parts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.3; p.vx*=0.94; p.alpha*=0.91; }); }

// ================================================================
// TOUCH SUPPORT（スマホ対応）
// ================================================================
function touchStarted(){
  if(touches.length>0){ let t=touches[0]; _pressAt(t.x,t.y); }
  return false;
}
function touchEnded(){
  if(touches.length===0){ mouseReleased(); }
  return false;
}
function touchMoved(){ return false; }
function _pressAt(px,py){
  let ox=mouseX,oy=mouseY; mouseX=px; mouseY=py;
  mousePressed(); mouseX=ox; mouseY=oy;
}

// ================================================================
// INPUT
// ================================================================
function mousePressed(){
  if(SCREEN==='TITLE'){
    // 言語ボタン判定（左上・縦並び）
    if(mouseX>10&&mouseX<110&&mouseY>14&&mouseY<52){ setLang('en'); playButton(); return; }
    if(mouseX>10&&mouseX<110&&mouseY>58&&mouseY<96){ setLang('ja'); playButton(); return; }
    let bw=240,bh=52,bx=GAME_W/2-120,by=GAME_H*0.68;
    if(mouseX>bx&&mouseX<bx+bw&&mouseY>by&&mouseY<by+bh){ playButton(); titleDragging=false; stageGlassUnlocked=false; initStageGlasses(); initStageWords(); SCREEN='STAGE_SELECT'; return; }
    // タイトルグラスのドラッグ開始
    if(!titleGlass.active && !titleGlass.gone){
      let dx=mouseX-titleGlass.x, dy=mouseY-titleGlass.y;
      if(sqrt(dx*dx+dy*dy)<50){ titleDragging=true; tdStartX=mouseX; tdStartY=mouseY; }
    }
    return;
  }
  if(SCREEN==='STAGE_SELECT'){
    if(volSliderPress()) return;
    if(resetPress()) return;
    // 隠しグラスのドラッグ開始
    if(stageGlassUnlocked && stageGlassPress(mouseX,mouseY)) return;
    // STAGE SELECTタイトルクリック → 隠しグラス解放
    let titleHitR=120;
    if(!stageGlassUnlocked &&
       abs(mouseX-GAME_W/2)<titleHitR && abs(mouseY-GAME_H*0.08)<22){
      stageGlassUnlocked=true;
      initStageGlasses();
      playCharge(3);
      return;
    }
    // モード切替タブ（下部）
    let tabW=160, tabH=32, tabY=GAME_H*0.895;
    let tab1x=GAME_W/2-tabW-4, tab2x=GAME_W/2+4;
    if(mouseX>tab1x&&mouseX<tab1x+tabW&&mouseY>tabY&&mouseY<tabY+tabH){ gameMode='single'; playButton(); return; }
    if(mouseX>tab2x&&mouseX<tab2x+tabW&&mouseY>tabY&&mouseY<tabY+tabH){ gameMode='endless'; playButton(); return; }
    // ステージカード
    const cols=3,cardW=SS_CARD_W,cardH=SS_CARD_H,ROW_GAP=SS_ROW_GAP,gapX=SS_GAP_X,startY=SS_START_Y;
    STAGES.forEach((st,i)=>{
      let col=i%cols,row=floor(i/cols),cx=gapX+col*(cardW+gapX),cy=startY+row*(cardH+ROW_GAP);
      if(mouseX>cx&&mouseX<cx+cardW&&mouseY>cy&&mouseY<cy+cardH){ playButton(); startGame(i); }
    });
    // 左右反転トグル
    let mtx2=RST_X-148, mty2=RST_Y-2;
    if(mouseX>mtx2&&mouseX<mtx2+100&&mouseY>mty2&&mouseY<mty2+RST_H+4){
      mirrorMode=!mirrorMode; playButton();
      // stageWordsを全リセットせず、mirror_toggleのwordだけ更新
      let tw=stageWords.find(w=>w.kind==='mirror_toggle');
      if(tw){ tw.txt=mirrorMode?LL().ui.mirror_on:LL().ui.mirror_off; tw.col=mirrorMode?[100,220,255]:[255,215,0]; tw.alive=true; }
      return;
    }
    // ← タイトル（左下）
    let bw=120,bh=34,bx=18,by=GAME_H*0.895;
    if(mouseX>bx&&mouseX<bx+bw&&mouseY>by&&mouseY<by+bh){
      playButton();
      initTitleWords();
      titleGlass={x:0,y:0,vx:0,vy:0,active:false,gone:false,angle:0};
      titleDragging=false;
      lastChargeTier=0;
      stageGlassUnlocked=false;  // 画面を離れたらリセット
      SCREEN='TITLE';
    }
    return;
  }
  // GAME
  // 戻るボタン
  let bw=130,bh=30,bx=14,by=GAME_H-46;
  if(mouseX>bx&&mouseX<bx+bw&&mouseY>by&&mouseY<by+bh){ playButton(); stageGlassUnlocked=false; initStageGlasses(); initStageWords(); SCREEN='STAGE_SELECT'; return; }

  if(S==='RESULT'){
    if(gameMode==='endless'){
      // 連続モードのRESULTは成功時のみ（失敗はENDLESS_ENDへ行っている）
      initRound();
    } else {
      initRound();
    }
    return;
  }
  if(S==='STAGE_CLEAR'||S==='ENDLESS_END'){ playButton(); stageGlassUnlocked=false; initStageGlasses(); initStageWords(); SCREEN='STAGE_SELECT'; return; }
  if(S!=='AIM') return;

  let dx=mouseX-g.x, dy=mouseY-(g.y+GLASS_H/2);
  if(sqrt(dx*dx+dy*dy)<52){ dragging=true; dStartX=mouseX; dStartY=mouseY; }
}

function mouseReleased(){
  volSliderRelease();
  // ステージセレクト隠しグラス射出
  if(SCREEN==='STAGE_SELECT' && sgDragIdx>=0){
    stageGlassRelease(); return;
  }
  // タイトルグラス射出
  if(SCREEN==='TITLE' && titleDragging){
    titleDragging=false;
    let ddx=mouseX-tdStartX, ddy=mouseY-tdStartY;
    let d=sqrt(ddx*ddx+ddy*ddy);
    if(d>=MIN_DRAG){
      let spd=constrain(d,MIN_DRAG,MAX_DRAG);
      let speed=map(spd,MIN_DRAG,MAX_DRAG,1.2,MAX_SPEED);
      titleGlass.vx=-(ddx/d)*speed;
      titleGlass.vy=-(ddy/d)*speed;
      titleGlass.active=true;
      playLaunch(map(spd,MIN_DRAG,MAX_DRAG,0,200));  // タイトル発射SE
      lastChargeTier=0;
    }
    return;
  }
  if(!dragging||S!=='AIM') return;
  dragging=false;
  let ddx=mouseX-dStartX, ddy=mouseY-dStartY;
  let d=sqrt(ddx*ddx+ddy*ddy);
  if(d<MIN_DRAG) return;
  let spd=constrain(d,MIN_DRAG,MAX_DRAG);
  let speed=map(spd,MIN_DRAG,MAX_DRAG,1.2,MAX_SPEED);

  // 500%ショット：速度×2＋blastモード起動
  if(is500shot){
    speed=MAX_SPEED*1.2;
    blast500Mode=true;
    blastCustomers=custs.map(c=>{
      let sy=stageSY(c.x);
      return { x:c.x, y:sy, vx:0, vy:0, va:0, angle:0, blown:false, data:Object.assign({},c) };
    });
    hadoukenTrail=[];
    // HUDテキストオブジェクト化
    let st=STAGES[currentStage];
    blastWords=[
      {txt:st.emoji+' '+LL().stages[currentStage].name,                                    x:130, y:22, vx:0,vy:0,va:0,angle:0,blown:false,sz:16,col:[255,215,0]},   // [0]
      {txt:'SCORE  '+score,                                          x:100, y:44, vx:0,vy:0,va:0,angle:0,blown:false,sz:15,col:[255,255,255]},  // [1]
      {txt:LL().hud.order(custs[targetIdx].name),       x:GAME_W/2,y:26,vx:0,vy:0,va:0,angle:0,blown:false,sz:15,col:[255,255,255]}, // [2]
      {txt:LL().ui.back_stage, x:14+65, y:GAME_H-34, vx:0,vy:0,va:0,angle:0,blown:false,sz:12,col:[180,180,180]},  // [3]
      {txt:LL().hud.throw_count(throwCount),                                        x:60,  y:56, vx:0,vy:0,va:0,angle:0,blown:false,sz:12,col:[180,180,180]},  // [4]
      {txt:gameMode==='endless'?LL().ui.mode_endless:LL().ui.mode_single,     x:68,  y:72, vx:0,vy:0,va:0,angle:0,blown:false,sz:11,col:gameMode==='endless'?[100,200,255]:[160,160,160]}, // [5]
      // 右上（[6][7]）
      ...(gameMode==='endless'
        ? [{txt:LL().hud.streak(streakCount), x:GAME_W-60,y:22,vx:0,vy:0,va:0,angle:0,blown:false,sz:15,col:[255,180,60]}]
        : [
            {txt:(()=>{ let h=''; for(let i=0;i<roundsCleared;i++) h+='🍺'; return h||'―'; })(), x:GAME_W-60,y:22,vx:0,vy:0,va:0,angle:0,blown:false,sz:16,col:[255,215,0]},
            {txt:LL().hud.remaining(roundsNeeded-roundsCleared), x:GAME_W-130,y:44,vx:0,vy:0,va:0,angle:0,blown:false,sz:12,col:[180,180,180]},
          ]
      ),
    ];
    is500shot=false; chargeHoldFrames=0;
  }

  // 引き方向の逆ベクトルで射出（mirrorMode時はvx反転）
  g.vx=-(ddx/d)*speed;
  g.vy=-(ddy/d)*speed;

  if(loopMode){
    if(blast500Mode || g.vy<-1.5){
      g.airborne=true;
    } else {
      // mirrorMode時：右にドラッグ→ddx>0→horizComp正→pathSpeed正→パスを前進
      // 通常  ：左にドラッグ→ddx<0→horizComp正→pathSpeed正→パスを前進
      let horizComp=mirrorMode?(ddx/d):-(ddx/d);
      pathSpeed=horizComp*speed*0.38;
      g.vx=0; g.vy=0;
    }
  } else {
    // blast500Mode時も通常と同じ発射挙動（ループステージ同様レールに乗れる）
    g.airborne = g.vy<-1.5;
    if(!g.airborne) g.vy=0;
  }
  // 発射音（引っ張り量に応じて3段階）
  let launchPct=map(spd,MIN_DRAG,MAX_DRAG,0,200);
  playLaunch(launchPct);
  lastChargeTier=0;
  chargeHoldFrames=0;
  throwCount++;
  S='SLIDE';
}

function windowResized(){ if(loopMode&&SCREEN==='GAME') buildLoopPath(); }
function drawCursor(){ push(); noFill(); stroke(255,255,255,170); strokeWeight(1.5); circle(mouseX,mouseY,18); stroke(255,215,0,200); strokeWeight(1); point(mouseX,mouseY); pop(); }
</script></body></html>
