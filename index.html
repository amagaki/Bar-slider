// AUDIO SYSTEM v2（Web Audio API）

let audioCtx=null;
let seVolume=0.6;  // 0.0〜1.0 スライダーで制御

function getACtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function masterOut(gain=0.3){
  let ac=getACtx(), g=ac.createGain();
  g.gain.value=gain*seVolume;
  g.connect(ac.destination);
  return g;
}

// ---------------------------------------------------------------
// チャージ音：澄んだ鈴の音（ベル系） 3段階
// tier 1=低め, 2=中, 3=高（200%到達時）
// ---------------------------------------------------------------
function playCharge(tier){
  let ac=getACtx(), out=masterOut(0.32);
  let baseFreqs=[660, 990, 1480]; // E5, B5, F#6
  let f=baseFreqs[constrain(tier-1,0,2)];
  let dur=[0.22, 0.28, 0.38][tier-1];

  // メイン正弦波（鈴の基音）
  let osc=ac.createOscillator(), env=ac.createGain();
  osc.type='sine'; osc.frequency.value=f;
  env.gain.setValueAtTime(0, ac.currentTime);
  env.gain.linearRampToValueAtTime(0.8, ac.currentTime+0.005);
  env.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
  osc.connect(env); env.connect(out);
  osc.start(); osc.stop(ac.currentTime+dur+0.05);

  // 2倍音（ベルらしい輝き）
  let osc2=ac.createOscillator(), env2=ac.createGain();
  osc2.type='sine'; osc2.frequency.value=f*2.76; // ベルの特徴的な倍音比
  env2.gain.setValueAtTime(0, ac.currentTime);
  env2.gain.linearRampToValueAtTime(0.35, ac.currentTime+0.004);
  env2.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur*0.6);
  osc2.connect(env2); env2.connect(out);
  osc2.start(); osc2.stop(ac.currentTime+dur);

  // tier3（200%）は追加の高音フラッシュ
  if(tier===3){
    let osc3=ac.createOscillator(), env3=ac.createGain();
    osc3.type='sine'; osc3.frequency.value=f*4;
    env3.gain.setValueAtTime(0, ac.currentTime);
    env3.gain.linearRampToValueAtTime(0.25, ac.currentTime+0.003);
    env3.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.12);
    osc3.connect(env3); env3.connect(out);
    osc3.start(); osc3.stop(ac.currentTime+0.14);
  }
}

// ---------------------------------------------------------------
// 発射音：スライド感のあるウッと滑る音
// pct: 0-200
// ---------------------------------------------------------------
function playLaunch(pct){
  let ac=getACtx(), out=masterOut(0.28);
  let t=ac.currentTime;
  let tier=pct<67?1:pct<134?2:3;
  let dur=[0.10, 0.15, 0.22][tier-1];
  let vol=[0.55, 0.75, 1.0][tier-1];

  // 木材を滑る低〜中域のこすれ音（バンドパスノイズ）
  let bufLen=Math.floor(ac.sampleRate*dur);
  let buf=ac.createBuffer(1, bufLen, ac.sampleRate);
  let d=buf.getChannelData(0);
  // ピンクノイズ的に生成
  let b0=0,b1=0,b2=0;
  for(let i=0;i<bufLen;i++){
    let wh=Math.random()*2-1;
    b0=0.99886*b0+wh*0.0555179;
    b1=0.99332*b1+wh*0.0750759;
    b2=0.96900*b2+wh*0.1538520;
    d[i]=(b0+b1+b2)*0.11;
  }
  let src=ac.createBufferSource(); src.buffer=buf;
  // 中域バンドパス（木のこすれ音域）
  let bp=ac.createBiquadFilter();
  bp.type='bandpass';
  bp.frequency.setValueAtTime(600, t);
  bp.frequency.exponentialRampToValueAtTime(200, t+dur);
  bp.Q.value=1.5;
  let nenv=ac.createGain();
  nenv.gain.setValueAtTime(vol, t);
  nenv.gain.exponentialRampToValueAtTime(0.001, t+dur);
  src.connect(bp); bp.connect(nenv); nenv.connect(out);
  src.start(t); src.stop(t+dur+0.01);

  // 初速の「カッ」感（短い高域トランジェント）
  let osc=ac.createOscillator(), oenv=ac.createGain();
  osc.type='triangle'; osc.frequency.value=1200;
  oenv.gain.setValueAtTime(vol*0.4, t);
  oenv.gain.exponentialRampToValueAtTime(0.001, t+0.03);
  osc.connect(oenv); oenv.connect(out);
  osc.start(t); osc.stop(t+0.04);
}

// ---------------------------------------------------------------
// 障害物・棚ボトルヒット音：ガシャン！破壊感
// ---------------------------------------------------------------
function playObstacleHit(isShelf=false){
  let ac=getACtx(), out=masterOut(isShelf?0.25:0.30);
  let t=ac.currentTime;

  if(isShelf){
    // 棚ボトル（v1.011版に戻す）：打撃＋高域ノイズ
    let osc=ac.createOscillator(), env=ac.createGain();
    osc.type='square';
    osc.frequency.setValueAtTime(1600, t);
    osc.frequency.exponentialRampToValueAtTime(400, t+0.06);
    env.gain.setValueAtTime(1.0, t);
    env.gain.exponentialRampToValueAtTime(0.001, t+0.07);
    osc.connect(env); env.connect(out);
    osc.start(t); osc.stop(t+0.08);
    let bufLen=Math.floor(ac.sampleRate*0.10);
    let buf=ac.createBuffer(1,bufLen,ac.sampleRate);
    let nd=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) nd[i]=(Math.random()*2-1);
    let nsrc=ac.createBufferSource(); nsrc.buffer=buf;
    let nhp=ac.createBiquadFilter(); nhp.type='highpass'; nhp.frequency.value=3500;
    let nenv=ac.createGain();
    nenv.gain.setValueAtTime(0.7, t);
    nenv.gain.exponentialRampToValueAtTime(0.001, t+0.10);
    nsrc.connect(nhp); nhp.connect(nenv); nenv.connect(out);
    nsrc.start(t); nsrc.stop(t+0.11);
  } else {
    // カウンター障害物：打撃トランジェント＋破片音＋低域ドン（既存）
    let osc=ac.createOscillator(), env=ac.createGain();
    osc.type='square';
    osc.frequency.setValueAtTime(1100, t);
    osc.frequency.exponentialRampToValueAtTime(200, t+0.06);
    env.gain.setValueAtTime(1.0, t);
    env.gain.exponentialRampToValueAtTime(0.001, t+0.07);
    osc.connect(env); env.connect(out);
    osc.start(t); osc.stop(t+0.08);
    let bufLen=Math.floor(ac.sampleRate*0.12);
    let buf=ac.createBuffer(1,bufLen,ac.sampleRate);
    let nd=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) nd[i]=(Math.random()*2-1);
    let nsrc=ac.createBufferSource(); nsrc.buffer=buf;
    let nhp=ac.createBiquadFilter(); nhp.type='highpass'; nhp.frequency.value=2800;
    let nenv=ac.createGain();
    nenv.gain.setValueAtTime(0.8, t);
    nenv.gain.linearRampToValueAtTime(1.0, t+0.008);
    nenv.gain.exponentialRampToValueAtTime(0.001, t+0.12);
    nsrc.connect(nhp); nhp.connect(nenv); nenv.connect(out);
    nsrc.start(t); nsrc.stop(t+0.13);
    let osc2=ac.createOscillator(), env2=ac.createGain();
    osc2.type='sine'; osc2.frequency.value=80;
    env2.gain.setValueAtTime(0.7, t);
    env2.gain.exponentialRampToValueAtTime(0.001, t+0.08);
    osc2.connect(env2); env2.connect(out);
    osc2.start(t); osc2.stop(t+0.10);
  }
}

  // 木のボディヒット感（低め・短め）

  osc.frequency.setValueAtTime(420, t);
  osc.frequency.exponentialRampToValueAtTime(180, t+0.04);
  env.gain.setValueAtTime(0.9, t);
  env.gain.exponentialRampToValueAtTime(0.001, t+0.06);
  osc.connect(env); env.connect(out);
  osc.start(t); osc.stop(t+0.07);

  // グラスの微細な振動音（高域の余韻）
  let osc2=ac.createOscillator(), env2=ac.createGain();
  osc2.type='sine'; osc2.frequency.value=2400;
  env2.gain.setValueAtTime(0.15, t+0.005);
  env2.gain.exponentialRampToValueAtTime(0.001, t+0.10);
  osc2.connect(env2); env2.connect(out);
  osc2.start(t+0.005); osc2.stop(t+0.12);
}

function smoothstep(e0,e1,x){ let t=constrain((x-e0)/(e1-e0),0,1); return t*t*(3-2*t); }
function counterRight(){ return GAME_W-COUNTER_R_PAD; }
function stageSY(x){ return STAGES[currentStage].sY(x); }
function obstH(type){ return type==='bottle'?38:16; }
function sgn(v){ return v>=0?1:-1; }

// ================================================================
// LOOP PATH BUILDER
// ================================================================
function buildLoopPath(){
  let pts=[];
  let flatY=GAME_H*0.65;
  let R=min(GAME_H*0.185, 110);   // ループ半径
  let cx=GAME_W*0.50;
  let cy=flatY-R;                 // ループ中心（フラットラインより R 上）
  let step=3;

  // 1. 左フラット  COUNTER_L → cx
  for(let x=COUNTER_L; x<=cx; x+=step) pts.push({x, y:flatY});
  loopEntryIdx=pts.length-1;

  // 2. ループ円
  // 進行方向（右向き）：底 → 右 → 上 → 左 → 底 (math clock wise = angle 減少)
  // angle PI/2 (bottom) → decreasing full circle
  let nLoop=180;
  for(let i=1; i<=nLoop; i++){
    let a=HALF_PI - TWO_PI*(i/nLoop);
    pts.push({ x: cx+R*cos(a), y: cy+R*sin(a) });
  }
  loopExitIdx=pts.length-1;

  // 3. 右フラット  cx → counterRight()
  for(let x=cx+step; x<=counterRight(); x+=step) pts.push({x, y:flatY});

  stagePath=pts;
}

// ================================================================
// スコア永続化（localStorage）
// ================================================================
const SAVE_KEY='barslider_records_v1';

function saveRecords(){
  try{
    let data=STAGES.map(st=>({
      cleared:st.cleared,
      bestRecord:st.bestRecord,           // 単一モードベスト
      bestEndlessRecord:st.bestEndlessRecord  // 連続モードベスト
    }));
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  }catch(e){}
}

function loadRecords(){
  try{
    let raw=localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    let data=JSON.parse(raw);
    data.forEach((d,i)=>{
      if(STAGES[i]){
        STAGES[i].cleared=d.cleared||false;
        STAGES[i].bestRecord=d.bestRecord||null;
        STAGES[i].bestEndlessRecord=d.bestEndlessRecord||null;
      }
    });
  }catch(e){}
}

function clearRecords(){
  try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
  STAGES.forEach(st=>{ st.cleared=false; st.bestRecord=null; st.bestEndlessRecord=null; });
}

function draw(){
  let ox=0,oy=0;
  if(shakeAmt>0.4){ ox=random(-shakeAmt,shakeAmt); oy=random(-shakeAmt,shakeAmt); shakeAmt*=0.80; translate(ox,oy); }
  background(5,1,16);
  titleAnim+=0.016;

  if(SCREEN==='TITLE'){ drawBgAtmosphere(); drawTitleScreen(); updateTitleGlass(); drawParticles(); particleStep(); }
  else if(SCREEN==='STAGE_SELECT'){ drawBgAtmosphere(); drawStageSelect(); updateVolumeSlider(); }
  else {
    drawBgAtmosphere(); drawBottleShelf(); drawCounter();
    drawBarDetails(); drawTargetZone(); drawCustomers();
    drawObstacles(); drawGlass(); drawParticles(); drawFloatingTexts();
    drawGameHUD(); drawOverlay();
    if(S==='SLIDE'){ physicsStep(); checkShelfBottleHits(); }
    obstacleStep(); particleStep(); updateShelfBottles(); updateFloatingTexts();
  }
  if(shakeAmt>0.4) translate(-ox,-oy);
  drawCursor();
}

function initTitleWords(){
  titleWords=[
    // kind: 'neon' | 'text' | 'button_label'
    // hitR: 当たり判定半径
    { txt:'BAR SLIDER',       x:GAME_W/2, y:GAME_H*0.30, vx:0,vy:0,va:0, angle:0, alive:true,
      kind:'neon', sz:72, col:[255,120,0], hitR:140 },

    { txt:'PLAY START',       x:GAME_W/2, y:GAME_H*0.68+26, vx:0,vy:0,va:0, angle:0, alive:true,
      kind:'button_label', sz:18, col:[255,180,0], hitR:90 },
    { txt:'グラスを引っ張って遊べるよ', x:GAME_W/2, y:GAME_H*0.62, vx:0,vy:0,va:0, angle:0, alive:true,
      kind:'hint', sz:13, col:[200,180,80], hitR:150 },
    { txt:'v1.21', x:GAME_W/2, y:GAME_H-18, vx:0,vy:0,va:0, angle:0, alive:true,
      kind:'small', sz:10, col:[80,80,80], hitR:80 },
  ];

function updateTitleWords(){
  titleWords.forEach(w=>{
    if(!w.alive) return;
    // グラスとの当たり判定
    let gx=titleGlass.x, gy=titleGlass.y;
    if(titleGlass.active || titleGlass.gone) return;  // 飛翔中は判定済みで処理しない
    // ↑飛翔中も当たり判定したいので修正
  });
}

function checkTitleWordHits(){
  if(!titleGlass.active) return;
  titleWords.forEach(w=>{
    if(!w.alive) return;
    let dx=titleGlass.x-w.x, dy=titleGlass.y-w.y;
    let d=sqrt(dx*dx+dy*dy);
    if(d < w.hitR){
      w.alive=false;
      let nx=dx/max(d,1), ny=dy/max(d,1);
      w.vx = titleGlass.vx*0.6 + nx*random(3,8);
      w.vy = titleGlass.vy*0.4 - random(2,7);
      w.va = random(-0.06, 0.06);
      playObstacleHit(w.kind==='neon');  // 文字ヒットSE
      for(let i=0;i<8;i++) parts.push({
        x:w.x+random(-20,20), y:w.y+random(-10,10),
        c:color(w.col[0],w.col[1],w.col[2]),
        vx:random(-5,5), vy:random(-6,0),
        r:random(2,4), alpha:200
      });
    }
  });
}

function drawAndUpdateTitleWords(pulse){
  titleWords.forEach(w=>{
    if(!w.alive){
      // 飛翔中の物理更新
      w.vy+=GRAVITY*0.6; w.vx*=0.99; w.x+=w.vx; w.y+=w.vy; w.angle+=w.va;
      if(w.y>GAME_H+60) return; // 画面外は描画スキップ
    }
    push();
    translate(w.x, w.y);
    rotate(w.angle);
    if(w.kind==='neon'){
      let a=w.alive?pulse:0.6;
      for(let i=7;i>0;i--){ fill(w.col[0],w.col[1],w.col[2],i*16*a); noStroke(); textSize(w.sz+i*0.8); text(w.txt,0,0); }
    } else if(w.kind==='italic'){
      fill(w.col[0],w.col[1],w.col[2], w.alive?(180+sin(titleAnim)*40):160);
      noStroke(); textStyle(ITALIC); textSize(w.sz); text(w.txt,0,0); textStyle(NORMAL);
    } else if(w.kind==='button_label'){
      fill(w.col[0],w.col[1],w.col[2], w.alive?200:180);
      noStroke(); textStyle(BOLD); textSize(w.sz); text(w.txt,0,0); textStyle(NORMAL);
    } else if(w.kind==='hint'){
      // ヒントテキスト：点滅なし・固定輝度
      fill(w.col[0],w.col[1],w.col[2], w.alive?190:120);
      noStroke(); textStyle(BOLD); textSize(w.sz); text(w.txt,0,0); textStyle(NORMAL);
    } else {
      fill(w.col[0],w.col[1],w.col[2]); noStroke(); textSize(w.sz); text(w.txt,0,0);
    }
    pop();
  });
}

// ================================================================
// SHELF BOTTLES（壊せる棚ボトル）
// ================================================================
const SY1=GAME_H*0.25, SY2=GAME_H*0.31;
const SHELF_BXS1=[0.17,0.24,0.30,0.37,0.44,0.51,0.58,0.65,0.72,0.79,0.85];
const SHELF_BXS2=[0.20,0.28,0.36,0.46,0.56,0.66,0.74,0.82];
const BOTTLE_COLS=[[18,65,28],[72,14,8],[15,42,72],[80,55,10],[35,18,75],[12,68,55],[90,22,18],[28,60,80],[45,30,90],[60,80,15],[80,30,55]];

function initShelfBottles(){
  shelfBottles=[];
  let allBxs=[...SHELF_BXS1.map(bx=>({bx,sy:SY1})), ...SHELF_BXS2.map(bx=>({bx,sy:SY2}))];
  allBxs.forEach(({bx,sy},i)=>{
    let h=44+sin(i*1.7)*14, w=8+sin(i*0.9)*2.5;
    shelfBottles.push({
      x:bx*GAME_W, baseY:sy, y:sy,
      vx:0, vy:0, va:0, angle:0,
      h, w, col:BOTTLE_COLS[i%BOTTLE_COLS.length],
      on:true, alpha:255
    });
  });
}

function drawShelfBottles(){
  shelfBottles.forEach((b,i)=>{
    if(!b.on && b.alpha<=0) return;
    if(!b.on) drawingContext.globalAlpha=b.alpha/255;
    push();
    translate(b.x, b.y);
    rotate(b.angle);
    let c=b.col;
    noStroke(); fill(c[0],c[1],c[2],210);
    rect(-b.w/2,-b.h, b.w, b.h*0.72, 2);
    rect(-2.5, -b.h*0.96, 5, b.h*0.32, 1);
    fill(c[0]+18,c[1]+18,c[2]+18,80);
    rect(-b.w/2+1,-b.h*0.52,b.w-2,b.h*0.22,1);
    fill(220,205,175,95);
    rect(-b.w/2+0.5,-b.h*0.48,b.w-1,b.h*0.26,1);
    pop();
    if(!b.on) drawingContext.globalAlpha=1.0;
  });
}

function updateShelfBottles(){
  shelfBottles.forEach(b=>{
    if(b.on || b.alpha<=0) return;
    b.x+=b.vx; b.y+=b.vy;
    b.vy+=0.5; b.vx*=0.97; b.angle+=b.va;
    b.alpha=max(0, b.alpha-6);  // 速めにフェード
  });
}

function checkShelfBottleHits(){
  if(!g.airborne) return;
  shelfBottles.forEach(b=>{
    if(!b.on) return;
    let bTopY=b.baseY-b.h;
    if(abs(g.x-b.x)<b.w*1.8 && g.y+GLASS_H>bTopY && g.y<b.baseY+4){
      b.on=false;
      b.vx=g.vx*0.5+sgn(g.vx)*random(1,4);
      b.vy=-random(3,8); b.va=random(-0.18,0.18);
      g.vx*=0.97; g.vy*=0.94;  // 減衰最小化（空中の自由度優先）
      shakeAmt=3;
      spawnParts(b.x,b.baseY-b.h/2,color(b.col[0],b.col[1],b.col[2]),5);
      playObstacleHit(true);
      score+=50;
      spawnFloatingText(b.x, b.baseY-b.h-10, '+50', [255,215,0]);
    }
  });
}

function drawBgAtmosphere(){
  [{x:GAME_W*0.22,c:[255,80,20]},{x:GAME_W*0.50,c:[20,140,255]},{x:GAME_W*0.78,c:[160,255,80]}].forEach(gw=>{
    let gc=drawingContext.createRadialGradient(gw.x,40,5,gw.x,40,240);
    gc.addColorStop(0,`rgba(${gw.c[0]},${gw.c[1]},${gw.c[2]},0.15)`); gc.addColorStop(1,'rgba(0,0,0,0)');
    drawingContext.fillStyle=gc; drawingContext.fillRect(0,0,GAME_W,GAME_H*0.6);

  noStroke();
  bgStars.forEach(s=>{ s.phase+=0.016; fill(255,255,240,75+sin(s.phase)*55); circle(s.x,s.y,s.r*2); });
}

function neonText(txt,x,y,sz,col,a=1.0){
  textStyle(BOLD);
  for(let i=7;i>0;i--){ fill(col[0],col[1],col[2],i*16*a); noStroke(); textSize(sz+i*0.8); text(txt,x,y); }
  textStyle(NORMAL);
}

function drawTitleScreen(){
  let pulse=sin(titleAnim*1.2)*0.3+0.7;

  // 文字オブジェクトを描画・物理更新
  drawAndUpdateTitleWords(pulse);

  // タイトルグラス（射出済みなら追従、未射出ならアニメ位置）
  if(!titleGlass.active && !titleGlass.gone){
    titleGlass.x=GAME_W/2+sin(titleAnim*0.7)*120;
    titleGlass.y=GAME_H*0.54+sin(titleAnim*1.1)*12;
  }
  if(!titleGlass.gone){
    drawAnimGlass(titleGlass.x, titleGlass.y, titleGlass.angle||0);
  }

  // ドラッグ中のUI表示
  if(titleDragging && !titleGlass.active){
    let ddx=mouseX-tdStartX, ddy=mouseY-tdStartY;
    let d=constrain(sqrt(ddx*ddx+ddy*ddy),0,MAX_DRAG);
    let pct=constrain(d/(MAX_DRAG*0.5),0,2.0);
    let pCol=pct<=1.0?lerpColor(color(50,220,100),color(255,200,0),pct):lerpColor(color(255,200,0),color(255,45,45),pct-1.0);
    stroke(255,255,255,70); strokeWeight(1.5); line(titleGlass.x,titleGlass.y,tdStartX,tdStartY);
    stroke(red(pCol),green(pCol),blue(pCol),200); fill(red(pCol),green(pCol),blue(pCol),200); strokeWeight(2.5);
    drawArrow(titleGlass.x,titleGlass.y,titleGlass.x-ddx*0.8,titleGlass.y-ddy*0.8);
    noFill(); stroke(255,215,0,80); strokeWeight(1.5); circle(titleGlass.x,titleGlass.y,d*0.72);
    fill(red(pCol),green(pCol),blue(pCol),215); noStroke(); textSize(13); textStyle(BOLD);
    text(floor(pct*100)+'%', titleGlass.x, titleGlass.y - 28); textStyle(NORMAL);
    // タイトルグラスのチャージ音
    let tier=pct<0.67?0:pct<1.34?1:pct<1.98?2:3;
    if(tier>0 && tier>lastChargeTier) playCharge(tier);
    lastChargeTier=tier;
  }

  // PLAY START ボタン枠だけ描画（ラベルはwordオブジェクトが担当）
  let bw=240,bh=52,bx=GAME_W/2-120,by=GAME_H*0.68;
  let hovBtn=mouseX>bx&&mouseX<bx+bw&&mouseY>by&&mouseY<by+bh;
  push();
  if(hovBtn){ fill(255,180,0,38); noStroke(); rect(bx-4,by-4,bw+8,bh+8,14); }
  stroke(255,180,0, hovBtn?230:150); strokeWeight(hovBtn?2.5:1.5);
  fill(255,180,0, hovBtn?32:16); rect(bx,by,bw,bh,10);
  pop();
}

function drawAnimGlass(x,y,angle=0){
  push(); translate(x,y); rotate(angle);
  stroke(188,212,255,130); strokeWeight(1.5); noFill();
  beginShape(); vertex(-GLASS_W/2,GLASS_H); vertex(-GLASS_W/2-3,0); vertex(GLASS_W/2+3,0); vertex(GLASS_W/2,GLASS_H); endShape(CLOSE);
  let fh=GLASS_H*0.75; noStroke(); fill(212,152,32,155);
  beginShape(); vertex(-GLASS_W/2+1,GLASS_H-1); vertex(-GLASS_W/2-1,GLASS_H-fh); vertex(GLASS_W/2+1,GLASS_H-fh); vertex(GLASS_W/2-1,GLASS_H-1); endShape(CLOSE);
  fill(238,232,215,200); ellipse(0,GLASS_H-fh,GLASS_W-2,6); pop();
}

function updateTitleGlass(){
  if(!titleGlass.active) return;
  titleGlass.vy+=GRAVITY; titleGlass.vx*=AIR_FRICTION;
  titleGlass.x+=titleGlass.vx; titleGlass.y+=titleGlass.vy;
  titleGlass.angle=(titleGlass.angle||0)+titleGlass.vx*0.025;

  // 文字との当たり判定
  checkTitleWordHits();

  if(titleGlass.y>GAME_H+60 || titleGlass.x<-100 || titleGlass.x>GAME_W+100){
    titleGlass.gone=true; titleGlass.active=false;
    // 2秒後にグラスだけリセット（文字は復活しない）
    setTimeout(()=>{ titleGlass={x:0,y:0,vx:0,vy:0,active:false,gone:false,angle:0}; },2000);
  }
}

function drawButton(x,y,w,h,label,hov,col){
  push();
  if(hov){ fill(col[0],col[1],col[2],38); noStroke(); rect(x-4,y-4,w+8,h+8,14); }
  stroke(col[0],col[1],col[2],hov?230:150); strokeWeight(hov?2.5:1.5);
  fill(col[0],col[1],col[2],hov?32:16); rect(x,y,w,h,10);
  fill(col[0],col[1],col[2],hov?255:200); noStroke(); textStyle(BOLD); textSize(hov?20:18);
  text(label,x+w/2,y+h/2); textStyle(NORMAL); pop();
}

let resetConfirm=false;   // スコアリセット確認フラグ
let resetConfirmTimer=0; // 確認タイマー（フレーム数）

function drawStageSelect(){
  neonText('STAGE SELECT',GAME_W/2,GAME_H*0.08,34,[80,200,255],0.9);

  // ================================================================
  // モード切替タブ（下部・v1.13スタイル）
  // ================================================================
  let modeIsEndless=gameMode==='endless';
  let tabW=160, tabH=32, tabY=GAME_H*0.895;
  let tab1x=GAME_W/2-tabW-4, tab2x=GAME_W/2+4;

  // 単一モードタブ
  let hov1=mouseX>tab1x&&mouseX<tab1x+tabW&&mouseY>tabY&&mouseY<tabY+tabH;
  push();
  stroke(!modeIsEndless?color(255,215,0):color(100,100,140), !modeIsEndless?220:100);
  strokeWeight(!modeIsEndless?2:1);
  fill(!modeIsEndless?color(40,32,0):color(15,15,30), !modeIsEndless?200:100);
  rect(tab1x,tabY,tabW,tabH, !modeIsEndless?[8,8,0,0]:[8,8,8,8]);
  fill(!modeIsEndless?color(255,215,0):color(120,120,160), hov1?255:(!modeIsEndless?230:160));
  noStroke(); textSize(13); textStyle(BOLD); textAlign(CENTER,CENTER);
  text('📍 単一モード', tab1x+tabW/2, tabY+tabH/2);
  textStyle(NORMAL); pop();

  // 連続モードタブ
  let hov2=mouseX>tab2x&&mouseX<tab2x+tabW&&mouseY>tabY&&mouseY<tabY+tabH;
  push();
  stroke(modeIsEndless?color(100,200,255):color(100,100,140), modeIsEndless?220:100);
  strokeWeight(modeIsEndless?2:1);
  fill(modeIsEndless?color(10,30,55):color(15,15,30), modeIsEndless?200:100);
  rect(tab2x,tabY,tabW,tabH, modeIsEndless?[8,8,0,0]:[8,8,8,8]);
  fill(modeIsEndless?color(100,200,255):color(120,120,160), hov2?255:(modeIsEndless?230:160));
  noStroke(); textSize(13); textStyle(BOLD); textAlign(CENTER,CENTER);
  text('🔄 連続モード', tab2x+tabW/2, tabY+tabH/2);
  textStyle(NORMAL); pop();

  // タブ下線
  stroke(modeIsEndless?color(100,200,255):color(255,215,0)); strokeWeight(2); noFill();
  line(tab1x, tabY+tabH, tab2x+tabW, tabY+tabH);

  // ================================================================
  // ステージカード
  // ================================================================
  let cols=3, cardW=min(GAME_W*0.28,240), cardH=cardW*0.62;
  let gapX=(GAME_W-cardW*cols)/(cols+1), startY=GAME_H*0.215;
  hoverStage=-1;
  STAGES.forEach((st,i)=>{
    let col=i%cols, row=floor(i/cols);
    let cx=gapX+col*(cardW+gapX), cy=startY+row*(cardH+28);
    let hov=mouseX>cx&&mouseX<cx+cardW&&mouseY>cy&&mouseY<cy+cardH;
    if(hov) hoverStage=i;
    drawStageCard(cx,cy,cardW,cardH,st,hov);
  });

  // ← タイトルボタン（左下）
  let bw=120,bh=34,bx=18,by=GAME_H*0.895;
  drawButton(bx,by,bw,bh,'← タイトル',mouseX>bx&&mouseX<bx+bw&&mouseY>by&&mouseY<by+bh,[150,150,150]);

  // SE音量スライダー（右下）
  drawVolumeSlider();

  // スコアリセットボタン（右上）
  drawResetButton();

  // リセット確認タイマー更新
  if(resetConfirmTimer>0){
    resetConfirmTimer--;
    if(resetConfirmTimer===0) resetConfirm=false;
  }
}

// スコアリセットボタン（右上・STAGE SELECTと同じ高さ）
const RST_X=GAME_W-118, RST_Y=GAME_H*0.065, RST_W=100, RST_H=28;

function drawResetButton(){
  let hov=mouseX>RST_X&&mouseX<RST_X+RST_W&&mouseY>RST_Y&&mouseY<RST_Y+RST_H;
  push();
  if(resetConfirm){
    // 確認状態：赤く点滅
    let blink=sin(frameCount*0.25)*0.5+0.5;
    stroke(255,80,80,180+blink*60); strokeWeight(1.5);
    fill(80,10,10,180); rect(RST_X,RST_Y,RST_W,RST_H,5);
    fill(255,100,100,230+blink*25); noStroke(); textSize(9); textStyle(BOLD);
    textAlign(CENTER,CENTER); text('本当に？押して確定',RST_X+RST_W/2,RST_Y+RST_H/2);
    textStyle(NORMAL);
  } else {
    stroke(120,80,80,hov?160:90); strokeWeight(1);
    fill(30,15,15,hov?120:70); rect(RST_X,RST_Y,RST_W,RST_H,5);
    fill(180,120,120,hov?220:150); noStroke(); textSize(9);
    textAlign(CENTER,CENTER); text('スコアリセット',RST_X+RST_W/2,RST_Y+RST_H/2);
  }
  pop();
}

function resetPress(){
  if(SCREEN!=='STAGE_SELECT') return false;
  if(mouseX<RST_X||mouseX>RST_X+RST_W||mouseY<RST_Y||mouseY>RST_Y+RST_H) return false;
  if(!resetConfirm){
    resetConfirm=true;
    resetConfirmTimer=180;  // 3秒間確認状態
  } else {
    // 確定リセット
    STAGES.forEach(st=>{ st.cleared=false; st.bestRecord=null; });
    clearRecords();
    resetConfirm=false; resetConfirmTimer=0;
    playButton();
  }
  return true;
}
// SE音量スライダー（右下・←タイトルと同じ高さ、リセットと同X）
const VOL_X=GAME_W-118, VOL_Y=GAME_H*0.912, VOL_W=100, VOL_H=6;
let volDragging=false;

function drawVolumeSlider(){
  let knobX=VOL_X+seVolume*VOL_W;
  // ラベル
  fill(160,160,160); noStroke(); textSize(10); textAlign(CENTER,CENTER);
  text('🔊 SE音量', VOL_X+VOL_W/2, VOL_Y-12);
  // トラック背景
  stroke(60,60,90); strokeWeight(2); noFill();
  line(VOL_X, VOL_Y, VOL_X+VOL_W, VOL_Y);
  // トラック前半（塗り）
  stroke(100,180,255); strokeWeight(2);
  line(VOL_X, VOL_Y, knobX, VOL_Y);
  // ノブ
  let hovKnob=dist(mouseX,mouseY,knobX,VOL_Y)<10;
  fill(hovKnob||volDragging?color(150,210,255):color(100,180,255));
  noStroke();
  circle(knobX, VOL_Y, hovKnob||volDragging?14:10);
  // 数値
  fill(140,140,160); textSize(9);
  text(floor(seVolume*100)+'%', VOL_X+VOL_W/2, VOL_Y+14);
  textAlign(CENTER,CENTER);
}

function updateVolumeSlider(){
  if(!volDragging) return;
  seVolume=constrain((mouseX-VOL_X)/VOL_W, 0, 1);
}

function volSliderPress(){
  if(SCREEN!=='STAGE_SELECT') return false;
  let knobX=VOL_X+seVolume*VOL_W;
  if(dist(mouseX,mouseY,knobX,VOL_Y)<14){ volDragging=true; return true; }
  // トラック上クリックでもジャンプ
  if(abs(mouseY-VOL_Y)<12 && mouseX>=VOL_X-5 && mouseX<=VOL_X+VOL_W+5){
    seVolume=constrain((mouseX-VOL_X)/VOL_W,0,1);
    volDragging=true;
    playCharge(2);  // 設定音
    return true;
  }
  return false;
}

function volSliderRelease(){
  if(volDragging){ volDragging=false; playCharge(2); }  // 離した時にSEでフィードバック
}

function drawStageCard(x,y,w,h,st,hov){
  push();
  let bc=st.cleared?[100,230,100]:hov?[255,200,60]:[80,80,120];
  if(hov){ fill(255,200,60,18); noStroke(); rect(x-3,y-3,w+6,h+6,14); }
  stroke(bc[0],bc[1],bc[2],hov?220:140); strokeWeight(hov?2:1.5);
  fill(12,10,28,200); rect(x,y,w,h,10);

  if(st.cleared && st.bestRecord){
    noStroke(); textAlign(LEFT,TOP);
    fill(100,230,100,230); textStyle(BOLD); textSize(11);
    text('✓ CLEAR', x+6, y+5);
    fill(180,215,255,220); textSize(12); textStyle(BOLD);
    text('単', x+6, y+20);
    fill(160,200,160,210); textSize(12); textStyle(NORMAL);
    text(st.bestRecord.throws+'投', x+6, y+35);
    fill(255,215,0,230); textSize(14); textStyle(BOLD);
    text(st.bestRecord.score+'pt', x+6, y+50);
  } else {
    noStroke(); textAlign(LEFT,TOP);
    if(st.cleared){ fill(100,230,100,230); textStyle(BOLD); textSize(11); text('✓ CLEAR', x+6, y+5); }
    // 単ラベルは未スコアでも見やすく
    fill(180,215,255,160); textSize(12); textStyle(BOLD);
    text('単', x+6, y+20);
    fill(160,200,160,110); textSize(11); textStyle(NORMAL);
    text('---', x+6, y+35);
  }
  // 連続モードベスト（右上）
  if(st.bestEndlessRecord){
    let br=st.bestEndlessRecord;
    noStroke(); textAlign(RIGHT,TOP);
    fill(100,200,255,220); textSize(12); textStyle(BOLD);
    text('連', x+w-6, y+20);
    fill(160,200,160,210); textSize(12); textStyle(NORMAL);
    text(br.streak+'連', x+w-6, y+34);
    fill(255,215,0,230); textSize(14); textStyle(BOLD);
    text(br.score+'pt', x+w-6, y+50);
  } else {
    noStroke(); textAlign(RIGHT,TOP);
    // 連ラベルは未スコアでも見やすく
    fill(100,200,255,160); textSize(12); textStyle(BOLD);
    text('連', x+w-6, y+20);
    fill(160,200,160,110); textSize(11); textStyle(NORMAL);
    text('---', x+w-6, y+35);
  }
  textAlign(CENTER,CENTER); textStyle(NORMAL);

  // 絵文字・ステージ名・説明
  noStroke(); textSize(24); text(st.emoji, x+w/2, y+h*0.48);
  fill(hov?color(255,220,80):color(220,220,255)); textStyle(BOLD); textSize(hov?16:14);
  text(st.name, x+w/2, y+h*0.70); textStyle(NORMAL);
  fill(150,150,170); textSize(10); text(st.sub, x+w/2, y+h*0.86);
  pop();
}

function startGame(idx){
  currentStage=idx; roundsCleared=0; score=0; throwCount=0; streakCount=0; endlessIsNewRecord=false;
  loopMode=STAGES[idx].isLoop;
  if(loopMode) buildLoopPath();
  SCREEN='GAME'; initRound();
}

function initRound(){
  // 酒の量：5段階からランダム選択
  let fillLevels=[
    {amt:0.10, label:'ひとくち', color:[175,95,22]},
    {amt:0.30, label:'少なめ',   color:[195,120,28]},
    {amt:0.55, label:'半分',     color:[212,152,32]},
    {amt:0.78, label:'多め',     color:[225,168,35]},
    {amt:0.97, label:'なみなみ', color:[240,195,40]},
  ];
  let fl=fillLevels[floor(random(fillLevels.length))];
  g={x:130,y:0,vx:0,vy:0,angle:0,done:false,airborne:false,
     fillAmt:fl.amt, fillLabel:fl.label, fillColor:fl.color};
  if(loopMode){
    pathT=0; pathSpeed=0;
    g.x=stagePath[0].x; g.y=stagePath[0].y-GLASS_H;
  } else {
    g.y=stageSY(g.x)-GLASS_H;
  }
  travelDist=0;

  // 障害物配置
  let W=GAME_W;
  if(loopMode){
    let cx=W*0.50, R=min(GAME_H*0.185,110);
    obs=[
      {type:'ashtray', x:cx-R-160, y:0,vx:0,vy:0,va:0,angle:0,on:true},  // ループ手前左
      {type:'nuts',    x:cx-R-30,  y:0,vx:0,vy:0,va:0,angle:0,on:true},  // ループ直前
      {type:'bottle',  x:cx+R+200, y:0,vx:0,vy:0,va:0,angle:0,on:true},  // ループ出口から遠め
    ];
    obs.forEach(o=>{ o.y=stageSY(o.x)-obstH(o.type); });
  } else {
    obs=[
      {type:'ashtray',x:W*0.36,y:0,vx:0,vy:0,va:0,angle:0,on:true},
      {type:'bottle', x:W*0.52,y:0,vx:0,vy:0,va:0,angle:0,on:true},
      {type:'nuts',   x:W*0.67,y:0,vx:0,vy:0,va:0,angle:0,on:true},
    ];
    obs.forEach(o=>{ o.y=stageSY(o.x)-obstH(o.type); });
  }

  let cxs=[W*0.78,W*0.87,W*0.95], names=['おじさん','姉ちゃん','おっちゃん'];
  custs=cxs.map((cx,i)=>({x:cx,name:names[i],y:stageSY(cx),face:'😐'}));
  targetIdx=floor(random(custs.length));
  dragging=false; parts=[]; resultMsg=''; floatingTexts=[]; vxHistory=[]; lastDeliverySuccess=false;
  initShelfBottles();
  S='AIM';
}

function drawCounter(){
  if(loopMode){ drawLoopCounter(); } else { drawStraightCounter(); }
}

function drawStraightCounter(){
  let CR=counterRight(), pts=[];
  for(let x=COUNTER_L;x<=CR;x+=4) pts.push({x,y:stageSY(x)});
  noStroke(); fill(46,24,6);
  beginShape(); pts.forEach(p=>vertex(p.x,p.y+14)); vertex(CR,GAME_H); vertex(COUNTER_L,GAME_H); endShape(CLOSE);
  for(let i=1;i<11;i++){ stroke(38,18,4,52+i*5); strokeWeight(1); noFill(); beginShape(); pts.forEach(p=>{let gy=p.y+18+i*16;if(gy<height)vertex(p.x,gy);}); endShape(); }
  stroke(92,55,18); strokeWeight(16); noFill(); beginShape(); pts.forEach(p=>vertex(p.x,p.y+7)); endShape();
  stroke(155,110,45,170); strokeWeight(2.5); noFill(); beginShape(); pts.forEach(p=>vertex(p.x,p.y)); endShape();
  stroke(215,185,105,50); strokeWeight(1); noFill(); beginShape(); pts.forEach(p=>vertex(p.x,p.y-3)); endShape();
  stroke(35,16,4); strokeWeight(1); fill(38,20,6);
  beginShape(); vertex(COUNTER_L,stageSY(COUNTER_L)+14); vertex(CR,stageSY(CR)+14); vertex(CR,stageSY(CR)+30); vertex(COUNTER_L,stageSY(COUNTER_L)+30); endShape(CLOSE);
}

function drawLoopCounter(){
  if(stagePath.length===0) return;
  let pts=stagePath;

  // 木製レール側面（厚み）
  stroke(92,55,18); strokeWeight(14); noFill();

  stroke(155,110,45,180); strokeWeight(2.5); noFill();

  // ハイライト
  stroke(215,185,105,55); strokeWeight(1); noFill();

  noStroke(); fill(46,24,6);
  beginShape();
  vertex(COUNTER_L,flatY+14);

  vertex(GAME_W*0.50-min(GAME_H*0.185,110)-2,GAME_H);

function drawGlass(){
  let dx=g.x;
  let idleBounce=0;
  if(S==='AIM'&&!dragging){
    // グラスをふわっと上下に揺らして「触ってね」を表現

    noFill(); stroke(255,215,0, 40+ringPulse*60); strokeWeight(1.5);

    text('← drag', g.x+36, g.y+GLASS_H/2+idleBounce);
  }
  if(S==='AIM'&&dragging){ let pull=constrain(dStartX-mouseX,0,45); dx=g.x-pull*0.22; }
  push(); translate(dx, g.y+idleBounce); rotate(g.angle);
  stroke(188,212,255,155); strokeWeight(1.5); noFill();
  beginShape(); vertex(-GLASS_W/2,GLASS_H); vertex(-GLASS_W/2-3,0); vertex(GLASS_W/2+3,0); vertex(GLASS_W/2,GLASS_H); endShape(CLOSE);
  let fh=(GLASS_H-3)*g.fillAmt;
  let fc=g.fillColor||[212,152,32];
  noStroke(); fill(fc[0],fc[1],fc[2],180);
  let taper=3*(1-g.fillAmt);
  beginShape(); vertex(-GLASS_W/2+1,GLASS_H-1); vertex(-GLASS_W/2-2+taper,GLASS_H-fh); vertex(GLASS_W/2+2-taper,GLASS_H-fh); vertex(GLASS_W/2-1,GLASS_H-1); endShape(CLOSE);
  fill(238,232,215,218); ellipse(0,GLASS_H-fh-1,GLASS_W-1,7);
  stroke(255,255,255,80); strokeWeight(1); noFill(); line(-GLASS_W/2-1,GLASS_H*0.12,-GLASS_W/2,GLASS_H*0.78);
  // 酒量ラベル（グラスの上）
  if(g.fillLabel){
    noStroke();
    fill(fc[0],fc[1],fc[2],210);
    textSize(10); textStyle(BOLD);
    text(g.fillLabel, 0, -10);
    textStyle(NORMAL);
  }
  pop();

  if(S==='AIM'&&dragging){
    let ddx=mouseX-dStartX,ddy=mouseY-dStartY;
    let dist=constrain(sqrt(ddx*ddx+ddy*ddy),0,MAX_DRAG);
    let pct=constrain(dist/(MAX_DRAG*0.5),0,2.0);
    let pCol=pct<=1.0?lerpColor(color(50,220,100),color(255,200,0),pct):lerpColor(color(255,200,0),color(255,45,45),pct-1.0);
    stroke(255,255,255,70); strokeWeight(1.5); line(g.x,g.y+GLASS_H/2,dStartX,dStartY);
    let tx=g.x-ddx*0.85, ty=g.y+GLASS_H/2-ddy*0.85;
    stroke(red(pCol),green(pCol),blue(pCol),200); fill(red(pCol),green(pCol),blue(pCol),200); strokeWeight(2.5);
    drawArrow(g.x,g.y+GLASS_H/2,tx,ty);
    noFill(); stroke(255,215,0,80); strokeWeight(1.5); circle(g.x,g.y+GLASS_H/2,dist*1.1);
    stroke(255,215,0,45); strokeWeight(1); circle(g.x,g.y+GLASS_H/2,MAX_DRAG*0.5*1.1);
    let dispPct=floor(pct*100);
    fill(red(pCol),green(pCol),blue(pCol),215); noStroke(); textSize(14); textStyle(BOLD);
    text(dispPct+'%', g.x, g.y - 28);
    textStyle(NORMAL);
    if(pct>=1.9){ fill(255,45,45,170+sin(frameCount*0.3)*60); textSize(11); text('MAX!', g.x, g.y-44); }
    // チャージ音：67%・134%・200%の閾値を超えた瞬間に鳴らす
    let tier=pct<0.67?0:pct<1.34?1:pct<1.98?2:3;
    if(tier>0 && tier>lastChargeTier) playCharge(tier);
    lastChargeTier=tier;
  }
}

// 着地ゾーン判定
const DELIVER_SPEED=7.0;   // 全客共通の許容速度（バカゲー判定）
const ZONE_HIT=ZONE_W+14;  // 判定幅（表示より少し広め）
const VX_HIST=5;

function trackVx(){
  // ループはpathSpeedをピクセル換算（1パス点≒3px）して通常ステージと単位を統一
  let v=loopMode ? abs(pathSpeed)*3 : abs(g.vx);
  vxHistory.push(v);
  if(vxHistory.length>VX_HIST) vxHistory.shift();
}

function avgSpeed(){
  // フォールバックもtrackVxと同じpx換算で統一
  if(vxHistory.length===0) return loopMode ? abs(pathSpeed)*3 : abs(g.vx);
  return vxHistory.reduce((a,b)=>a+b,0)/vxHistory.length;
}

function findHitCustomer(){
  let spd=avgSpeed();
  let best=-1, bestDist=Infinity;
  custs.forEach((c,i)=>{
    let d=abs(g.x-c.x);
    if(d<ZONE_HIT && spd<DELIVER_SPEED && d<bestDist){ bestDist=d; best=i; }
  });
  return best;
}

function spawnFloatingText(x, y, txt, col=[255,215,0]){
  floatingTexts.push({x, y, vy:-1.4, alpha:255, txt, col, size:18});
}
function drawFloatingTexts(){
  noStroke();
  floatingTexts.forEach(ft=>{
    fill(ft.col[0], ft.col[1], ft.col[2], ft.alpha);
    textSize(ft.size); textStyle(BOLD);
    text(ft.txt, ft.x, ft.y);
    textStyle(NORMAL);
  });
}
function updateFloatingTexts(){
  floatingTexts=floatingTexts.filter(ft=>ft.alpha>3);
  floatingTexts.forEach(ft=>{
    ft.y+=ft.vy; ft.vy*=0.95; ft.alpha*=0.93;
  });
}

function drawArrow(x1,y1,x2,y2){ line(x1,y1,x2,y2); let ang=atan2(y2-y1,x2-x1); push(); translate(x2,y2); rotate(ang); noStroke(); triangle(0,0,-12,-5,-12,5); pop(); }
function drawParticles(){ noStroke(); parts.forEach(p=>{ fill(red(p.c),green(p.c),blue(p.c),p.alpha); circle(p.x,p.y,p.r*2); }); }

function drawGameHUD(){
  let st=STAGES[currentStage];
  fill(255,215,0); noStroke(); textStyle(BOLD); textSize(16); textAlign(LEFT,TOP);
  text(st.emoji+' '+st.name, 18, 14); textStyle(NORMAL);
  fill(255,255,255); textSize(15); text('SCORE  '+score, 18, 36);
  fill(180,180,180); textSize(12); text(throwCount+'投目', 18, 56);
  // モード表示
  fill(gameMode==='endless'?color(100,200,255):color(160,160,160)); textSize(11);
  text(gameMode==='endless'?'🔄 連続モード':'📍 単一モード', 18, 72);

  textAlign(RIGHT,TOP);
  if(gameMode==='endless'){
    fill(255,180,60); textSize(15); textStyle(BOLD);
    text('連続 '+streakCount+'回', GAME_W-18, 14); textStyle(NORMAL);
    fill(180,180,180); textSize(11); text('2回成功でクリアなし', GAME_W-18, 36);
  } else {
    let hearts=''; for(let i=0;i<roundsCleared;i++) hearts+='🍺';
    fill(255,215,0); textSize(16); textStyle(BOLD); text(hearts||'―', GAME_W-18, 14); textStyle(NORMAL);
    fill(180,180,180); textSize(12); text('あと'+(roundsNeeded-roundsCleared)+'回成功でクリア', GAME_W-18, 36);
  }

  textAlign(RIGHT,TOP);
  let hearts=''; for(let i=0;i<roundsCleared;i++) hearts+='🍺';
  fill(255,215,0); textSize(16); textStyle(BOLD); text(hearts||'―', GAME_W-18, 14); textStyle(NORMAL);
  fill(180,180,180); textSize(12); text('あと'+(roundsNeeded-roundsCleared)+'回成功でクリア', GAME_W-18, 36);

  textAlign(CENTER,CENTER);
  if(S==='AIM'){
    fill(255,255,255,220); textSize(15); textStyle(BOLD);
    text('オーダー: '+custs[targetIdx].name+' にビールを！', GAME_W/2, 26);
    textStyle(NORMAL);
    fill(180,180,180,160); textSize(13);
    text('グラスをクリック → 引っ張る → 離す', GAME_W/2, GAME_H-26);
  }

  // ← ステージ選択ボタン
  let bw=130,bh=32,bx=14,by=GAME_H-50;
  let hovBack=mouseX>bx&&mouseX<bx+bw&&mouseY>by&&mouseY<by+bh;
  push();
  stroke(120,120,120,hovBack?200:100); strokeWeight(1);
  fill(0,0,0,hovBack?120:70); rect(bx,by,bw,bh,6);
  fill(180,180,180,hovBack?240:160); noStroke(); textSize(12); textStyle(hovBack?BOLD:NORMAL);
  textAlign(CENTER,CENTER); text('← ステージ選択', bx+bw/2, by+bh/2);
  textStyle(NORMAL); textAlign(CENTER,CENTER);
  pop();
}

function drawOverlay(){
  if(S==='RESULT'){
    fill(0,0,0,160); noStroke(); rect(GAME_W/2-260,GAME_H/2-65,520,130,14);
    fill(255,215,0); textSize(22); textStyle(BOLD); text(resultMsg,GAME_W/2,GAME_H/2-16); textStyle(NORMAL);
    fill(175,175,175); textSize(12);
    if(gameMode==='endless'){
      text('連続 '+streakCount+'回成功  |  SCORE '+score+'  |  クリックで続ける',GAME_W/2,GAME_H/2+28);
    } else {
      text('成功: '+roundsCleared+'/'+roundsNeeded+'  |  クリックで続ける',GAME_W/2,GAME_H/2+28);
    }
  }
  if(S==='STAGE_CLEAR'){
    fill(0,0,0,175); noStroke(); rect(GAME_W/2-260,GAME_H/2-96,520,192,16);
    fill(100,255,120); textSize(32); textStyle(BOLD); text('🎉 STAGE CLEAR！',GAME_W/2,GAME_H/2-36); textStyle(NORMAL);
    fill(255,215,0); textSize(18); text('SCORE: '+score,GAME_W/2,GAME_H/2+4);
    fill(180,200,180); textSize(13); text(throwCount+'投でクリア',GAME_W/2,GAME_H/2+26);
    fill(175,175,175); textSize(13); text('クリックでステージ選択へ',GAME_W/2,GAME_H/2+50);
  }
  if(S==='ENDLESS_END'){
    let st=STAGES[currentStage];
    fill(0,0,0,185); noStroke(); rect(GAME_W/2-280,GAME_H/2-112,560,224,16);
    fill(255,180,60); textSize(28); textStyle(BOLD); text('🍺 連続モード終了！',GAME_W/2,GAME_H/2-70); textStyle(NORMAL);
    fill(255,255,255); textSize(16); textStyle(BOLD);
    text('連続成功  '+streakCount+'回', GAME_W/2, GAME_H/2-32);
    textStyle(NORMAL);
    fill(255,215,0); textSize(15);
    text('SCORE  '+score, GAME_W/2, GAME_H/2-8);
    fill(180,200,180); textSize(13);
    text(throwCount+'投', GAME_W/2, GAME_H/2+14);
    if(st.bestEndlessRecord){
      let br=st.bestEndlessRecord;
      fill(endlessIsNewRecord?color(100,255,150):color(150,150,150)); textSize(12);
      text(endlessIsNewRecord?'🆕 NEW RECORD！':'BEST: 連続'+br.streak+'回  '+br.score+'pt  '+br.throws+'投', GAME_W/2, GAME_H/2+38);
    }
    fill(175,175,175); textSize(13);
    text('クリックでステージ選択へ', GAME_W/2, GAME_H/2+66);
  }
}

// ================================================================
// PHYSICS — 通常
// ================================================================
function physicsStep(){
  if(g.done) return;
  if(loopMode){ physicsStepLoop(); return; }
  if(g.airborne){
    g.vy+=GRAVITY; g.vx*=AIR_FRICTION;
    g.x+=g.vx; g.y+=g.vy;
    travelDist+=abs(g.vx)+abs(g.vy);
    g.angle+=g.vx*0.018;
    trackVx();
    let CR=counterRight();
    if(g.x<COUNTER_L-40||g.x>CR+60||g.y>GAME_H+60){ finishRound(); return; }
    // サブステップ着地判定（速度が大きい時に突き抜け防止）
    let surf=stageSY(g.x)-GLASS_H;
    if(g.y>=surf&&g.vy>0){
      g.y=surf; g.vy=0; g.vx*=0.75; g.airborne=false;
      shakeAmt=4; spawnParts(g.x,g.y+GLASS_H,color(180,160,255),6); playLand();
    }
    obs.forEach(o=>{ if(o.on&&abs(g.x-o.x)<22&&abs(g.y-o.y)<22) hitObs(o); });
    if(travelDist>60){
      let hit=findHitCustomer();
      if(hit>=0){ deliverTo(hit); return; }
    }
  } else {
    let slope=stageSY(g.x+1)-stageSY(g.x);
    g.vx+=slope*SLOPE_FACTOR; g.vx*=FRICTION;
    g.x+=g.vx; g.y=stageSY(g.x)-GLASS_H;
    travelDist+=abs(g.vx);
    g.angle=lerp(g.angle,-g.vx*0.024,0.12);
    trackVx();
    obs.forEach(o=>{ if(o.on&&abs(g.x-o.x)<20) hitObs(o); });
    if(travelDist>60){
      let hit=findHitCustomer();
      if(hit>=0){ deliverTo(hit); return; }
    }
    let CR=counterRight();
    if(g.x>CR+10) finishRound();
    else if(g.x<COUNTER_L+20&&travelDist>100) finishRound();
    else if(abs(g.vx)<0.35&&travelDist>80) finishRound();
  }
}

// ================================================================
// PHYSICS — ループ（パス追従 + 空中対応）
// ================================================================
function physicsStepLoop(){
  if(g.done) return;

  // 空中中はフリー物理
  if(g.airborne){
    g.vy+=GRAVITY; g.vx*=AIR_FRICTION;
    g.x+=g.vx; g.y+=g.vy;
    travelDist+=abs(g.vx)+abs(g.vy);
    g.angle+=g.vx*0.018;
    if(g.x<COUNTER_L-40||g.x>counterRight()+60||g.y>GAME_H+60){ finishRound(); return; }

    // パス着地判定：完全全点スキャン（v6オリジナル）
    // ループ面にも着地可能・g.vy>0（落下中）のみ判定
    if(stagePath.length>0){
      for(let i=0; i<stagePath.length-1; i++){
        let px=stagePath[i].x, py=stagePath[i].y;
        if(abs(g.x-px)<8 && g.y>=py-GLASS_H && g.vy>0){
          pathT=i; pathSpeed=g.vx*0.28;
          g.y=py-GLASS_H; g.vx=0; g.vy=0; g.airborne=false;
          shakeAmt=5; spawnParts(g.x,g.y+GLASS_H,color(180,160,255),6); playLand();
          return;
        }
      }
    }

    obs.forEach(o=>{ if(o.on&&dist(g.x,g.y,o.x,o.y)<22) hitObs(o); });
    return;
  }

  // パス追従物理
  let n=stagePath.length;
  let iCurr=floor(constrain(pathT,0,n-2));
  let iNext=min(iCurr+1,n-1);

  let slopeDelta=(stagePath[iNext].y - stagePath[iCurr].y) * SLOPE_FACTOR * 0.6;
  pathSpeed+=slopeDelta;
  pathSpeed*=FRICTION;

  pathT+=pathSpeed;
  pathT=constrain(pathT,0,n-1);
  travelDist+=abs(pathSpeed);
  trackVx();

  let idx=floor(constrain(pathT,0,n-2));
  g.x=stagePath[idx].x;
  g.y=stagePath[idx].y-GLASS_H;

  let i2=min(idx+1,n-1);
  let dx2=stagePath[i2].x-stagePath[idx].x;
  let dy2=stagePath[i2].y-stagePath[idx].y;
  g.angle=lerp(g.angle,atan2(dy2,dx2),0.18);

  obs.forEach(o=>{ if(o.on&&dist(g.x,g.y+GLASS_H/2,o.x,o.y)<22) hitObs(o); });

  if(pathT>loopExitIdx+10){
    let hit=findHitCustomer();
    if(hit>=0){ deliverTo(hit); return; }
  }

  if(pathT>=n-3){ finishRound(); return; }
  if(pathT<=2&&pathSpeed<0){ resultMsg='😵 失速して戻った！'; roundOver(); return; }
  if(abs(pathSpeed)<0.25&&travelDist>30){ finishRound(); return; }
}

// ================================================================
// HIT / DELIVER / FINISH
// ================================================================
function hitObs(o){
  o.on=false;
  let spd=loopMode?pathSpeed:g.vx;
  o.vx=spd*0.65+sgn(spd)*random(2,5);
  o.vy=-random(5,10); o.va=random(-0.17,0.17);
  if(loopMode) pathSpeed*=0.97+random(-0.01,0.01);
  else g.vx*=0.97+random(-0.01,0.01);
  shakeAmt=6;
  let pc=o.type==='bottle'?color(38,155,55):o.type==='ashtray'?color(155,150,135):color(170,125,55);
  spawnParts(o.x,o.y,pc,12);
  playObstacleHit(false);
  // 障害物スコア +50
  score+=50;
  spawnFloatingText(o.x, o.y-20, '+50', [255,215,0]);
}

function deliverTo(idx){
  if(g.done) return;
  g.done=true; g.vx=0; g.vy=0; g.angle=0; g.airborne=false; pathSpeed=0;
  if(idx===targetIdx){
    score+=1000; roundsCleared++;
    custs[idx].face='😄'; spawnParts(g.x,g.y,color(255,215,0),28); shakeAmt=3;
    playDeliver();
    spawnFloatingText(g.x, g.y-30, '+1000', [255,215,0]);
    if(gameMode==='endless'){
      streakCount++;
      resultMsg='🍺 ナイスサーブ！  +1000  (連続 '+streakCount+'回！)';
    } else {
      resultMsg='🍺 ナイスサーブ！  +1000';
    }
    lastDeliverySuccess=true;   // 成功フラグ
  } else {
    resultMsg='😅 違う人に届いた！';
    custs[idx].face='😲'; custs[targetIdx].face='😤';
    lastDeliverySuccess=false;
  }
  checkStageEnd();
}

function finishRound(){
  if(g.done) return;
  if(loopMode){
    if(g.airborne && g.y>GAME_H)              resultMsg='🌊 床に落ちた！';
    else if(g.airborne && g.x>counterRight()) resultMsg='🥊 端から落ちた！';
    else if(g.airborne && g.x<COUNTER_L-40)  resultMsg='↩️ 手元に戻った！';
    else if(pathT>=stagePath.length-3)        resultMsg='🥊 端から飛び出た！';
    else if(abs(pathSpeed)<0.25)              resultMsg='😬 途中で止まった…';
    else                                       resultMsg='😬 届かなかった…';
  } else {
    if(g.y>GAME_H)              resultMsg='🌊 床に落ちた！';
    else if(g.x>counterRight()) resultMsg='🥊 端から落ちた！';
    else if(g.x<COUNTER_L+30)  resultMsg='↩️ 手元に戻った！';
    else                         resultMsg='😬 届かなかった…';
  }
  custs[targetIdx].face='😤';
  g.done=true; g.vx=0; g.vy=0; pathSpeed=0;
  lastDeliverySuccess=false;
  checkStageEnd();
}

function roundOver(){
  g.done=true; g.vx=0; g.vy=0; pathSpeed=0;
  custs[targetIdx].face='😤';
  resultMsg='😵 失速して戻った！';
  lastDeliverySuccess=false;
  checkStageEnd();
}

function checkStageEnd(){
  if(gameMode==='endless'){
    if(lastDeliverySuccess){
      S='RESULT';
    } else {
      endlessEnd();
    }
    return;
  }
  // 単一モード
  if(roundsCleared>=roundsNeeded){
    let st=STAGES[currentStage];
    st.cleared=true;
    let isNewRecord=false;
    if(!st.bestRecord){
      isNewRecord=true;
    } else {
      let fewer = throwCount < st.bestRecord.throws;
      let sameThrowsHigherScore = throwCount===st.bestRecord.throws && score>st.bestRecord.score;
      if(fewer||sameThrowsHigherScore) isNewRecord=true;
    }
    if(isNewRecord) st.bestRecord={score:score, throws:throwCount};
    saveRecords();
    S='STAGE_CLEAR'; playStageClear();
  } else S='RESULT';
}

function endlessEnd(){
  let st=STAGES[currentStage];
  let isNew=false;
  if(!st.bestEndlessRecord){
    isNew=true;
  } else {
    let more = throwCount > st.bestEndlessRecord.throws;
    let sameTHigher = throwCount===st.bestEndlessRecord.throws && score>st.bestEndlessRecord.score;
    if(more||sameTHigher) isNew=true;
  }
  if(isNew) st.bestEndlessRecord={score:score, throws:throwCount, streak:streakCount};
  saveRecords();
  endlessIsNewRecord=isNew;  // 描画用フラグ
  S='ENDLESS_END';
}

function obstacleStep(){ obs.forEach(o=>{ if(o.on)return; o.x+=o.vx; o.y+=o.vy; o.vy+=0.44; o.vx*=0.98; o.angle+=o.va; }); }
function spawnParts(x,y,c,n=12){ for(let i=0;i<n;i++) parts.push({x,y,c,vx:random(-6,6),vy:random(-9,0.5),r:random(2,5),alpha:255}); }
function particleStep(){ parts=parts.filter(p=>p.alpha>4); parts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.3; p.vx*=0.94; p.alpha*=0.91; }); }

// ================================================================
// TOUCH SUPPORT（スマホ対応）
// ================================================================
function touchStarted(){
  if(touches.length>0){ let t=touches[0]; _pressAt(t.x,t.y); }
  return false;
}
function touchEnded(){
  if(touches.length===0){ mouseReleased(); }
  return false;
}
function touchMoved(){ return false; }
function _pressAt(px,py){
  let ox=mouseX,oy=mouseY; mouseX=px; mouseY=py;
  mousePressed(); mouseX=ox; mouseY=oy;
}

// ================================================================
// INPUT
// ================================================================
function mousePressed(){
  if(SCREEN==='TITLE'){
    let bw=240,bh=52,bx=GAME_W/2-120,by=GAME_H*0.68;
    if(mouseX>bx&&mouseX<bx+bw&&mouseY>by&&mouseY<by+bh){ playButton(); titleDragging=false; SCREEN='STAGE_SELECT'; return; }
    // タイトルグラスのドラッグ開始
    if(!titleGlass.active && !titleGlass.gone){
      let dx=mouseX-titleGlass.x, dy=mouseY-titleGlass.y;
      if(sqrt(dx*dx+dy*dy)<50){ titleDragging=true; tdStartX=mouseX; tdStartY=mouseY; }
    }
    return;
  }
  if(SCREEN==='STAGE_SELECT'){
    if(volSliderPress()) return;
    if(resetPress()) return;
    // モード切替タブ（下部）
    let tabW=160, tabH=32, tabY=GAME_H*0.895;
    let tab1x=GAME_W/2-tabW-4, tab2x=GAME_W/2+4;
    if(mouseX>tab1x&&mouseX<tab1x+tabW&&mouseY>tabY&&mouseY<tabY+tabH){ gameMode='single'; playButton(); return; }
    if(mouseX>tab2x&&mouseX<tab2x+tabW&&mouseY>tabY&&mouseY<tabY+tabH){ gameMode='endless'; playButton(); return; }
    // ステージカード
    let cols=3,cardW=min(GAME_W*0.28,240),cardH=cardW*0.62,gapX=(GAME_W-cardW*cols)/(cols+1),startY=GAME_H*0.215;
    STAGES.forEach((st,i)=>{
      let col=i%cols,row=floor(i/cols),cx=gapX+col*(cardW+gapX),cy=startY+row*(cardH+28);
      if(mouseX>cx&&mouseX<cx+cardW&&mouseY>cy&&mouseY<cy+cardH){ playButton(); startGame(i); }
    });
    // ← タイトル（左下）
    let bw=120,bh=34,bx=18,by=GAME_H*0.895;
    if(mouseX>bx&&mouseX<bx+bw&&mouseY>by&&mouseY<by+bh){
      playButton();
      initTitleWords();
      titleGlass={x:0,y:0,vx:0,vy:0,active:false,gone:false,angle:0};
      titleDragging=false;
      lastChargeTier=0;
      SCREEN='TITLE';
    }
    return;
  }
  // GAME
  // 戻るボタン
  let bw=130,bh=30,bx=14,by=GAME_H-46;
  if(mouseX>bx&&mouseX<bx+bw&&mouseY>by&&mouseY<by+bh){ playButton(); SCREEN='STAGE_SELECT'; return; }

  if(S==='RESULT'){
    if(gameMode==='endless'){
      // 連続モードのRESULTは成功時のみ（失敗はENDLESS_ENDへ行っている）
      initRound();
    } else {
      initRound();
    }
    return;
  }
  if(S==='STAGE_CLEAR'||S==='ENDLESS_END'){ playButton(); SCREEN='STAGE_SELECT'; return; }
  if(S!=='AIM') return;

  let dx=mouseX-g.x, dy=mouseY-(g.y+GLASS_H/2);
  if(sqrt(dx*dx+dy*dy)<52){ dragging=true; dStartX=mouseX; dStartY=mouseY; }
}

function mouseReleased(){
  volSliderRelease();  // 音量スライダーリリース
  // タイトルグラス射出
  if(SCREEN==='TITLE' && titleDragging){
    titleDragging=false;
    let ddx=mouseX-tdStartX, ddy=mouseY-tdStartY;
    let d=sqrt(ddx*ddx+ddy*ddy);
    if(d>=MIN_DRAG){
      let spd=constrain(d,MIN_DRAG,MAX_DRAG);
      let speed=map(spd,MIN_DRAG,MAX_DRAG,1.2,MAX_SPEED);
      titleGlass.vx=-(ddx/d)*speed;
      titleGlass.vy=-(ddy/d)*speed;
      titleGlass.active=true;
      playLaunch(map(spd,MIN_DRAG,MAX_DRAG,0,200));  // タイトル発射SE
      lastChargeTier=0;
    }
    return;
  }
  if(!dragging||S!=='AIM') return;
  dragging=false;
  let ddx=mouseX-dStartX, ddy=mouseY-dStartY;
  let d=sqrt(ddx*ddx+ddy*ddy);
  if(d<MIN_DRAG) return;
  let spd=constrain(d,MIN_DRAG,MAX_DRAG);
  let speed=map(spd,MIN_DRAG,MAX_DRAG,1.2,MAX_SPEED);

  // 引き方向の逆ベクトルで射出（ループ・通常共通）
  g.vx=-(ddx/d)*speed;
  g.vy=-(ddy/d)*speed;

  if(loopMode){
    if(g.vy<-1.5){
      g.airborne=true;
    } else {
      let horizComp=-(ddx/d);
      pathSpeed=horizComp*speed*0.38;
      g.vx=0; g.vy=0;
    }
  } else {
    g.airborne=g.vy<-1.5;
    if(!g.airborne) g.vy=0;
  }
  // 発射音（引っ張り量に応じて3段階）
  let launchPct=map(spd,MIN_DRAG,MAX_DRAG,0,200);
  playLaunch(launchPct);
  lastChargeTier=0;
  throwCount++;   // 投げ数カウント
  S='SLIDE';
}

function windowResized(){ if(loopMode&&SCREEN==='GAME') buildLoopPath(); }
function drawCursor(){ push(); noFill(); stroke(255,255,255,170); strokeWeight(1.5); circle(mouseX,mouseY,18); stroke(255,215,0,200); strokeWeight(1); point(mouseX,mouseY); pop(); }
